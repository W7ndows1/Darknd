services:
  - type: web
    name: my-proxy
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm && pnpm install
    startCommand: pnpm start
    envVars:
      - key: PROXY_PASSWORD
        sync: false        # Set this manually in the Render dashboard — do NOT hardcode it
      - key: NODE_ENV
        value: production
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: no-referrer
