<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Admin Panel — Darknd</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
        <style>
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

            :root {
                --bg: #06060a;
                --surface: rgba(11, 11, 18, 0.97);
                --surface-2: rgba(255,255,255,0.025);
                --border: rgba(255, 255, 255, 0.06);
                --border-h: rgba(255, 255, 255, 0.12);
                --accent: #7c5af0;
                --accent-glow: rgba(124,90,240,0.2);
                --red: #f87171;
                --red-bg: rgba(248,113,113,0.08);
                --red-border: rgba(248,113,113,0.25);
                --green: #4ade80;
                --green-bg: rgba(74,222,128,0.08);
                --green-border: rgba(74,222,128,0.25);
                --amber: #fbbf24;
                --blue: #60a5fa;
                --text: #e8e8e8;
                --text-muted: #505060;
                --text-dim: #2a2a35;
                --font-d: 'Syne', sans-serif;
                --font-m: 'DM Mono', monospace;
                --radius: 14px;
                --radius-sm: 8px;
            }

            body {
                min-height: 100vh;
                background: var(--bg);
                font-family: var(--font-d);
                color: var(--text);
                background-image:
                    radial-gradient(ellipse 60% 40% at 50% -10%, rgba(124,90,240,0.06) 0%, transparent 60%);
            }

            /* ── Header ─────────────────────────────────────────────── */
            header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 1rem 2rem;
                border-bottom: 1px solid var(--border);
                position: sticky;
                top: 0;
                background: rgba(6,6,10,0.9);
                z-index: 10;
                backdrop-filter: blur(20px);
                box-shadow: 0 1px 0 var(--border);
            }

            .header-left { display: flex; align-items: center; gap: 1rem; }

            .home-btn {
                display: flex;
                align-items: center;
                justify-content: center;
                color: var(--text-muted);
                text-decoration: none;
                padding: 7px;
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                transition: all 0.2s ease;
            }
            .home-btn:hover {
                color: var(--text);
                background: var(--surface-2);
                border-color: var(--border-h);
                transform: scale(1.05);
            }

            .brand-mark { width: 32px; height: 32px; position: relative; flex-shrink: 0; }
            .brand-mark .b1, .brand-mark .b2 {
                position: absolute;
                border-radius: 50%;
                width: 16px;
                height: 16px;
            }
            .brand-mark .b1 { top: 0; left: 0; background: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.2); }
            .brand-mark .b2 { bottom: 0; right: 0; background: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

            .header-title { font-size: 0.95rem; font-weight: 700; color: var(--text); }
            .header-sub { font-family: var(--font-m); font-size: 0.57rem; letter-spacing: 0.2em; color: var(--text-muted); margin-top: 1px; }

            .header-right { display: flex; align-items: center; gap: 0.75rem; }

            .stat-pill {
                font-family: var(--font-m);
                font-size: 0.65rem;
                color: var(--text-muted);
                background: var(--surface-2);
                border: 1px solid var(--border);
                border-radius: 20px;
                padding: 0.3rem 0.85rem;
                letter-spacing: 0.03em;
            }
            .stat-pill span { color: var(--text); }

            .logout-btn {
                font-family: var(--font-m);
                font-size: 0.6rem;
                letter-spacing: 0.14em;
                color: var(--text-muted);
                background: none;
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                padding: 0.35rem 0.8rem;
                cursor: pointer;
                transition: color 0.2s, border-color 0.2s, background 0.2s;
            }
            .logout-btn:hover {
                color: var(--red);
                border-color: var(--red-border);
                background: var(--red-bg);
            }

            /* ── Main Grid ──────────────────────────────────────────── */
            main {
                max-width: 1040px;
                margin: 0 auto;
                padding: 2rem;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 1.25rem;
                animation: page-in 0.5s ease both;
            }

            @keyframes page-in {
                from { opacity: 0; transform: translateY(12px); }
                to { opacity: 1; transform: translateY(0); }
            }

            @media (max-width: 700px) { main { grid-template-columns: 1fr; } }

            /* ── Panels ─────────────────────────────────────────────── */
            .panel {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                overflow: hidden;
                transition: border-color 0.2s;
            }
            .panel:hover { border-color: var(--border-h); }
            .panel.full-width { grid-column: 1 / -1; }

            .panel-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0.85rem 1.25rem;
                border-bottom: 1px solid var(--border);
                background: rgba(255,255,255,0.01);
            }

            .panel-title {
                font-family: var(--font-m);
                font-size: 0.6rem;
                letter-spacing: 0.22em;
                color: var(--text-muted);
            }

            .panel-action {
                font-family: var(--font-m);
                font-size: 0.6rem;
                letter-spacing: 0.1em;
                color: var(--red);
                background: none;
                border: 1px solid var(--red-border);
                border-radius: 6px;
                padding: 0.22rem 0.6rem;
                cursor: pointer;
                transition: background 0.2s, transform 0.1s;
                position: relative;
                overflow: hidden;
            }
            .panel-action:hover { background: var(--red-bg); }
            .panel-action:active { transform: scale(0.96); }

            .panel-body {
                padding: 1rem 1.25rem;
                display: flex;
                flex-direction: column;
                gap: 0.55rem;
            }

            /* ── List Items ─────────────────────────────────────────── */
            .session-item, .password-item, .ann-item-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                background: var(--surface-2);
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                padding: 0.6rem 0.9rem;
                gap: 0.5rem;
                transition: border-color 0.2s;
            }
            .session-item:hover, .password-item:hover, .ann-item-row:hover {
                border-color: var(--border-h);
            }

            .session-info { display: flex; flex-direction: column; gap: 0.2rem; }
            .session-token { font-family: var(--font-m); font-size: 0.76rem; color: #9090b0; }
            .session-age { font-family: var(--font-m); font-size: 0.62rem; color: var(--text-muted); }

            .revoke-btn, .pw-btn.del {
                font-family: var(--font-m);
                font-size: 0.6rem;
                color: var(--red);
                background: none;
                border: 1px solid var(--red-border);
                border-radius: 5px;
                padding: 0.22rem 0.55rem;
                cursor: pointer;
                white-space: nowrap;
                transition: background 0.2s, transform 0.1s;
                flex-shrink: 0;
            }
            .revoke-btn:hover, .pw-btn.del:hover { background: var(--red-bg); }
            .revoke-btn:active, .pw-btn.del:active { transform: scale(0.95); }

            .pw-text {
                font-family: var(--font-m);
                font-size: 0.8rem;
                color: #8888aa;
                flex: 1;
                cursor: pointer;
                user-select: none;
                transition: color 0.2s;
            }
            .pw-text:hover { color: #aaaacc; }
            .pw-text.revealed { color: var(--text); }

            .pw-actions { display: flex; gap: 0.4rem; flex-shrink: 0; align-items: center; }

            .pw-btn {
                font-family: var(--font-m);
                font-size: 0.58rem;
                background: none;
                border: 1px solid var(--border);
                border-radius: 5px;
                padding: 0.22rem 0.55rem;
                cursor: pointer;
                color: var(--text-muted);
                transition: color 0.2s, border-color 0.2s, transform 0.1s;
            }
            .pw-btn:hover { color: var(--text); border-color: var(--border-h); }
            .pw-btn:active { transform: scale(0.95); }

            .gear-btn {
                font-size: 0.85rem !important;
                padding: 0.15rem 0.4rem !important;
                color: var(--text-muted) !important;
                line-height: 1;
            }
            .gear-btn:hover { color: var(--text) !important; transform: rotate(30deg) !important; transition: transform 0.2s, color 0.2s !important; }

            /* Expiry badge */
            .expiry-badge {
                font-family: var(--font-m);
                font-size: 0.58rem;
                color: var(--text-muted);
                background: var(--surface-2);
                border: 1px solid var(--border);
                border-radius: 5px;
                padding: 0.15rem 0.45rem;
                white-space: nowrap;
                flex-shrink: 0;
                letter-spacing: 0.04em;
            }
            .expiry-badge.expiring-soon { color: var(--amber); border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.06); }
            .expiry-badge.expired-badge { color: var(--red); border-color: var(--red-border); background: var(--red-bg); }
            .expiry-badge.perm { color: var(--green); border-color: var(--green-border); background: var(--green-bg); }

            /* Add form */
            .add-form { display: flex; gap: 0.5rem; margin-top: 0.4rem; }

            .add-input {
                flex: 1;
                padding: 0.65rem 0.9rem;
                background: rgba(255,255,255,0.03);
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                color: var(--text);
                font-family: var(--font-m);
                font-size: 0.82rem;
                outline: none;
                transition: border-color 0.2s, box-shadow 0.2s;
            }
            .add-input:focus {
                border-color: rgba(124,90,240,0.4);
                box-shadow: 0 0 0 3px rgba(124,90,240,0.08);
            }
            .add-input::placeholder { color: var(--text-dim); }

            .add-btn {
                padding: 0 1rem;
                background: var(--accent);
                color: #fff;
                border: none;
                border-radius: var(--radius-sm);
                cursor: pointer;
                font-family: var(--font-m);
                font-size: 0.68rem;
                letter-spacing: 0.08em;
                transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
                box-shadow: 0 3px 14px rgba(124,90,240,0.3);
                position: relative;
                overflow: hidden;
            }
            .add-btn:hover { background: #9b7ef8; box-shadow: 0 3px 20px rgba(124,90,240,0.5); }
            .add-btn:active { transform: scale(0.96); }

            /* ── Toast ──────────────────────────────────────────────── */
            .toast {
                position: fixed;
                bottom: 1.5rem;
                left: 50%;
                transform: translateX(-50%) translateY(8px);
                background: rgba(18, 18, 28, 0.97);
                border: 1px solid var(--border-h);
                border-radius: var(--radius-sm);
                padding: 0.65rem 1.3rem;
                font-family: var(--font-m);
                font-size: 0.75rem;
                color: var(--text);
                opacity: 0;
                transition: all 0.25s cubic-bezier(0.22,1,0.36,1);
                pointer-events: none;
                z-index: 200;
                backdrop-filter: blur(12px);
                box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            }
            .toast.show {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }

            .empty-msg {
                font-family: var(--font-m);
                font-size: 0.7rem;
                color: var(--text-dim);
                text-align: center;
                padding: 1rem 0;
            }

            .rename-input {
                flex: 1;
                background: rgba(255,255,255,0.04);
                border: 1px solid var(--border-h);
                border-radius: 5px;
                color: var(--text);
                font-family: var(--font-m);
                font-size: 0.8rem;
                padding: 0.18rem 0.45rem;
                outline: none;
            }

            /* Announcement */
            .ann-text { font-family: var(--font-m); font-size: 0.76rem; color: #9090aa; flex: 1; line-height: 1.45; }

            /* Chat rows */
            .chat-msg-row {
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
                background: var(--surface-2);
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                padding: 0.55rem 0.9rem;
                gap: 0.5rem;
                transition: border-color 0.2s;
            }
            .chat-msg-row:hover { border-color: var(--border-h); }
            .chat-msg-info { display: flex; flex-direction: column; gap: 0.15rem; flex: 1; }
            .chat-msg-sender { font-family: var(--font-m); font-size: 0.7rem; color: var(--blue); }
            .chat-msg-sender.admin-sender { color: var(--red); }
            .chat-msg-body { font-family: var(--font-m); font-size: 0.73rem; color: #777790; line-height: 1.45; }
            .chat-msg-time { font-family: var(--font-m); font-size: 0.58rem; color: var(--text-dim); }

            /* ── Key Config Modal ───────────────────────────────────── */
            .modal-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.72);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 150;
                backdrop-filter: blur(8px);
            }

            .modal-box {
                background: rgba(11, 11, 18, 0.99);
                border: 1px solid var(--border-h);
                border-radius: var(--radius);
                padding: 1.75rem 2rem;
                width: 100%;
                max-width: 340px;
                display: flex;
                flex-direction: column;
                gap: 1.25rem;
                box-shadow: 0 30px 70px rgba(0,0,0,0.8), 0 0 0 1px rgba(124,90,240,0.1);
                animation: modal-in 0.25s cubic-bezier(0.22,1,0.36,1) both;
            }

            @keyframes modal-in {
                from { opacity: 0; transform: scale(0.95) translateY(8px); }
                to { opacity: 1; transform: scale(1) translateY(0); }
            }

            /* Top accent line on modal */
            .modal-box::before {
                content: '';
                position: absolute;
                top: 0; left: 15%; right: 15%;
                height: 1px;
                background: linear-gradient(90deg, transparent, var(--accent), transparent);
                opacity: 0.4;
            }
            .modal-box { position: relative; }

            .modal-title {
                font-family: var(--font-m);
                font-size: 0.65rem;
                letter-spacing: 0.22em;
                color: var(--text-muted);
            }

            .modal-key-preview {
                font-family: var(--font-m);
                font-size: 0.82rem;
                color: #8080a0;
                background: var(--surface-2);
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                padding: 0.55rem 0.9rem;
            }

            .modal-section-label {
                font-family: var(--font-m);
                font-size: 0.6rem;
                letter-spacing: 0.14em;
                color: var(--text-muted);
                margin-bottom: 0.5rem;
            }

            .modal-duration-row { display: flex; gap: 0.5rem; align-items: center; }

            .modal-duration-num {
                width: 70px;
                padding: 0.5rem 0.6rem;
                background: rgba(255,255,255,0.03);
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                color: var(--text);
                font-family: var(--font-m);
                font-size: 0.85rem;
                outline: none;
                transition: border-color 0.2s;
            }
            .modal-duration-num:focus { border-color: rgba(124,90,240,0.4); }

            .modal-duration-unit {
                flex: 1;
                padding: 0.5rem 0.6rem;
                background: rgba(255,255,255,0.03);
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                color: var(--text);
                font-family: var(--font-m);
                font-size: 0.8rem;
                outline: none;
                cursor: pointer;
                transition: border-color 0.2s;
            }
            .modal-duration-unit:focus { border-color: rgba(124,90,240,0.4); }
            .modal-duration-unit option { background: #0e0e18; }

            .modal-perm-toggle {
                font-family: var(--font-m);
                font-size: 0.62rem;
                letter-spacing: 0.06em;
                color: var(--text-muted);
                background: none;
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                padding: 0.32rem 0.7rem;
                cursor: pointer;
                transition: all 0.2s;
                white-space: nowrap;
            }
            .modal-perm-toggle.active {
                color: var(--green);
                border-color: var(--green-border);
                background: var(--green-bg);
            }

            .modal-actions { display: flex; gap: 0.6rem; }

            .modal-save {
                flex: 1;
                padding: 0.65rem;
                background: var(--accent);
                color: #fff;
                border: none;
                border-radius: var(--radius-sm);
                cursor: pointer;
                font-family: var(--font-m);
                font-size: 0.7rem;
                letter-spacing: 0.1em;
                transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
                box-shadow: 0 3px 14px rgba(124,90,240,0.3);
            }
            .modal-save:hover { background: #9b7ef8; box-shadow: 0 3px 20px rgba(124,90,240,0.5); }
            .modal-save:active { transform: scale(0.97); }

            .modal-cancel {
                flex: 1;
                padding: 0.65rem;
                background: none;
                color: var(--text-muted);
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                cursor: pointer;
                font-family: var(--font-m);
                font-size: 0.7rem;
                letter-spacing: 0.1em;
                transition: color 0.2s, border-color 0.2s, background 0.2s;
            }
            .modal-cancel:hover { color: var(--text); border-color: var(--border-h); background: var(--surface-2); }

            /* Ripple */
            .ripple-wave {
                position: absolute;
                border-radius: 50%;
                background: rgba(255,255,255,0.2);
                transform: scale(0);
                animation: ripple-go 0.55s ease-out forwards;
                pointer-events: none;
            }
            @keyframes ripple-go {
                to { transform: scale(3); opacity: 0; }
            }
        </style>
    </head>
    <body>
        <header>
            <div class="header-left">
                <a href="/" class="home-btn" title="Back to Home">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </a>
                <div class="brand-mark"><span class="b1"></span><span class="b2"></span></div>
                <div>
                    <div class="header-title">Admin Panel</div>
                    <div class="header-sub">DARKND</div>
                </div>
            </div>
            <div class="header-right">
                <div class="stat-pill">Sessions: <span id="stat-sessions">—</span></div>
                <div class="stat-pill">Total logins: <span id="stat-logins">—</span></div>
                <form method="POST" action="/admin/logout" style="margin:0">
                    <button type="submit" class="logout-btn">LOGOUT</button>
                </form>
            </div>
        </header>

        <main>
            <!-- Sessions Panel -->
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">ACTIVE SESSIONS</span>
                    <button class="panel-action" onclick="revokeAll()">REVOKE ALL</button>
                </div>
                <div class="panel-body" id="sessions-list">
                    <div class="empty-msg">Loading...</div>
                </div>
            </div>

            <!-- Access Keys Panel -->
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">ACCESS KEYS</span>
                </div>
                <div class="panel-body" id="passwords-list">
                    <div class="empty-msg">Loading...</div>
                </div>
                <div class="panel-body" style="border-top: 1px solid var(--border);">
                    <div class="add-form">
                        <input class="add-input" id="new-password" type="text" placeholder="New access key..." />
                        <button class="add-btn" onclick="addPassword()">ADD KEY</button>
                    </div>
                </div>
            </div>

            <!-- Announcements Panel (full width) -->
            <div class="panel full-width">
                <div class="panel-header">
                    <span class="panel-title">ANNOUNCEMENTS</span>
                </div>
                <div class="panel-body" id="announcements-list">
                    <div class="empty-msg">Loading...</div>
                </div>
                <div class="panel-body" style="border-top: 1px solid var(--border);">
                    <div class="add-form">
                        <input class="add-input" id="new-announcement" type="text" placeholder="New announcement..." />
                        <button class="add-btn" onclick="addAnnouncement()">POST</button>
                    </div>
                </div>
            </div>

            <!-- Chat Messages Panel (full width) -->
            <div class="panel full-width">
                <div class="panel-header">
                    <span class="panel-title">CHAT MESSAGES</span>
                    <button class="panel-action" onclick="clearChat()">CLEAR ALL</button>
                </div>
                <div class="panel-body" id="chat-admin-list">
                    <div class="empty-msg">Loading...</div>
                </div>
            </div>
        </main>

        <div class="toast" id="toast"></div>

        <!-- Key Config Modal -->
        <div class="modal-overlay" id="key-config-modal" style="display:none" onclick="handleModalOverlayClick(event)">
            <div class="modal-box">
                <div class="modal-title">KEY CONFIGURATION</div>
                <div class="modal-key-preview" id="modal-key-preview">••••••••</div>
                <div>
                    <div class="modal-section-label">DURATION</div>
                    <div class="modal-duration-row">
                        <input class="modal-duration-num" id="modal-duration-num" type="number" min="1" value="1" />
                        <select class="modal-duration-unit" id="modal-duration-unit">
                            <option value="minutes">Minutes</option>
                            <option value="hours" selected>Hours</option>
                            <option value="days">Days</option>
                            <option value="months">Months</option>
                            <option value="years">Years</option>
                        </select>
                        <button class="modal-perm-toggle" id="modal-perm-btn" onclick="togglePermanent()">∞ PERM</button>
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="modal-save" onclick="saveKeyConfig()">SAVE</button>
                    <button class="modal-cancel" onclick="closeKeyConfig()">CANCEL</button>
                </div>
            </div>
        </div>

        <script>
            // Ripple effect on all buttons
            document.addEventListener('click', function(e) {
                const btn = e.target.closest('button');
                if (!btn || btn.style.position === '') btn && (btn.style.position = 'relative');
                if (!btn) return;
                btn.style.overflow = 'hidden';
                const r = document.createElement('span');
                r.className = 'ripple-wave';
                const rect = btn.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px;position:absolute;`;
                btn.appendChild(r);
                setTimeout(() => r.remove(), 600);
            });

            let state = { sessions: [], passwords: [] };
            let configTargetKey = null;
            let isPermanent = true;
            let countdownInterval = null;

            // ── State Loading ────────────────────────────────────────────────
            async function loadState() {
                try {
                    const res = await fetch("/admin/api/state");
                    state = await res.json();
                    renderSessions();
                    renderPasswords();
                    document.getElementById("stat-sessions").textContent = state.activeSessions;
                    document.getElementById("stat-logins").textContent = state.totalLogins;
                } catch (e) { console.error("Failed to load state", e); }
            }

            // ── Sessions ─────────────────────────────────────────────────────
            function timeAgo(minutes) {
                if (minutes < 1) return "just now";
                if (minutes < 60) return `${minutes}m ago`;
                const h = Math.floor(minutes / 60);
                if (h < 24) return `${h}h ago`;
                return `${Math.floor(h / 24)}d ago`;
            }

            function renderSessions() {
                const list = document.getElementById("sessions-list");
                if (!state.sessions || state.sessions.length === 0) {
                    list.innerHTML = '<div class="empty-msg">No active sessions</div>'; return;
                }
                list.innerHTML = state.sessions.map(s => `
                    <div class="session-item">
                        <div class="session-info">
                            <div class="session-token">${s.token}</div>
                            <div class="session-age">logged in ${timeAgo(s.age)}</div>
                        </div>
                        <button class="revoke-btn" onclick="revokeSession('${s.fullToken}')">REVOKE</button>
                    </div>
                `).join("");
            }

            // ── Expiry Formatting ────────────────────────────────────────────
            function formatExpiry(expiresAt) {
                if (expiresAt === null) return { label: "∞ PERM", cls: "perm" };
                const remaining = expiresAt - Date.now();
                if (remaining <= 0) return { label: "EXPIRED", cls: "expired-badge" };
                const totalSec = Math.floor(remaining / 1000);
                const totalMin = Math.floor(totalSec / 60);
                const totalHr  = Math.floor(totalMin / 60);
                const totalDay = Math.floor(totalHr / 24);
                const totalYr  = Math.floor(totalDay / 365);
                let label;
                if (totalYr > 0)      label = `${totalYr}y ${totalDay % 365}d`;
                else if (totalDay > 0) label = `${totalDay}d ${totalHr % 24}h`;
                else if (totalHr > 0)  label = `${totalHr}h ${totalMin % 60}m`;
                else                   label = `${totalMin}m ${totalSec % 60}s`;
                const cls = remaining < 3600000 ? "expiring-soon" : "";
                return { label, cls };
            }

            // ── Passwords / Keys ─────────────────────────────────────────────
            function renderPasswords() {
                const list = document.getElementById("passwords-list");
                if (!state.passwords || state.passwords.length === 0) {
                    list.innerHTML = '<div class="empty-msg">No access keys</div>'; return;
                }
                list.innerHTML = state.passwords.map((pw, i) => {
                    const { label, cls } = formatExpiry(pw.expiresAt);
                    const safeKey = encodeURIComponent(pw.key);
                    return `
                        <div class="password-item" id="pw-item-${i}">
                            <div class="pw-text" title="Click to reveal" onclick="toggleReveal(this, '${pw.key.replace(/'/g, "\\'")}')">••••••••</div>
                            <span class="expiry-badge ${cls}" id="expiry-badge-${i}" data-expires="${pw.expiresAt === null ? 'null' : pw.expiresAt}">${label}</span>
                            <div class="pw-actions">
                                <button class="pw-btn gear-btn" title="Key Configuration" onclick="openKeyConfig(${i}, decodeURIComponent('${safeKey}'), ${pw.expiresAt === null ? 'null' : pw.expiresAt})">⚙</button>
                                <button class="pw-btn" onclick="startRename(${i}, decodeURIComponent('${safeKey}'))">RENAME</button>
                                <button class="pw-btn del" onclick="deletePassword(decodeURIComponent('${safeKey}'))">DELETE</button>
                            </div>
                        </div>
                    `;
                }).join("");

                startCountdowns();
            }

            function startCountdowns() {
                if (countdownInterval) clearInterval(countdownInterval);
                countdownInterval = setInterval(() => {
                    document.querySelectorAll(".expiry-badge[data-expires]").forEach(badge => {
                        const raw = badge.dataset.expires;
                        if (raw === "null") return;
                        const expiresAt = Number(raw);
                        const { label, cls } = formatExpiry(expiresAt);
                        badge.textContent = label;
                        badge.className = `expiry-badge ${cls}`;
                    });
                }, 1000);
            }

            function toggleReveal(el, pw) {
                if (el.classList.contains("revealed")) {
                    el.textContent = "••••••••"; el.classList.remove("revealed");
                } else { el.textContent = pw; el.classList.add("revealed"); }
            }

            function startRename(i, oldPw) {
                const item = document.getElementById(`pw-item-${i}`);
                item.innerHTML = `
                    <input class="rename-input" id="rename-input-${i}" type="text" value="${oldPw.replace(/"/g, '&quot;')}" />
                    <div class="pw-actions">
                        <button class="pw-btn" onclick="confirmRename(${i}, decodeURIComponent('${encodeURIComponent(oldPw)}'))">SAVE</button>
                        <button class="pw-btn" onclick="loadState()">CANCEL</button>
                    </div>
                `;
                document.getElementById(`rename-input-${i}`).focus();
            }

            async function confirmRename(i, oldPw) {
                const newPw = document.getElementById(`rename-input-${i}`).value.trim();
                if (!newPw) return toast("Key cannot be empty");
                const res = await api("/admin/api/passwords/rename", { oldPassword: oldPw, newPassword: newPw });
                if (res.ok) { await loadState(); toast("Key renamed"); }
                else toast(res.error);
            }

            async function addPassword() {
                const input = document.getElementById("new-password");
                const pw = input.value.trim();
                if (!pw) return toast("Key cannot be empty");
                const res = await api("/admin/api/passwords/add", { password: pw });
                if (res.ok) { await loadState(); input.value = ""; toast("Key added"); }
                else toast(res.error);
            }

            async function deletePassword(pw) {
                if (!confirm(`Delete this key?`)) return;
                const res = await api("/admin/api/passwords/delete", { password: pw });
                if (res.ok) { await loadState(); toast("Key deleted"); }
                else toast(res.error);
            }

            // ── Key Config Modal ─────────────────────────────────────────────
            function openKeyConfig(i, key, expiresAt) {
                configTargetKey = key;
                document.getElementById("modal-key-preview").textContent = key.slice(0, 3) + "•".repeat(Math.max(0, key.length - 3));

                if (expiresAt === null) {
                    isPermanent = true;
                    document.getElementById("modal-perm-btn").classList.add("active");
                    document.getElementById("modal-duration-num").disabled = true;
                    document.getElementById("modal-duration-unit").disabled = true;
                } else {
                    isPermanent = false;
                    document.getElementById("modal-perm-btn").classList.remove("active");
                    document.getElementById("modal-duration-num").disabled = false;
                    document.getElementById("modal-duration-unit").disabled = false;
                    const remaining = expiresAt - Date.now();
                    if (remaining > 0) {
                        const hrs = Math.floor(remaining / 3600000);
                        document.getElementById("modal-duration-num").value = Math.max(1, hrs);
                        document.getElementById("modal-duration-unit").value = "hours";
                    }
                }

                document.getElementById("key-config-modal").style.display = "flex";
            }

            function closeKeyConfig() {
                document.getElementById("key-config-modal").style.display = "none";
                configTargetKey = null;
            }

            function handleModalOverlayClick(e) {
                if (e.target === document.getElementById("key-config-modal")) closeKeyConfig();
            }

            function togglePermanent() {
                isPermanent = !isPermanent;
                const btn = document.getElementById("modal-perm-btn");
                const numInput = document.getElementById("modal-duration-num");
                const unitSelect = document.getElementById("modal-duration-unit");
                if (isPermanent) {
                    btn.classList.add("active");
                    numInput.disabled = true; unitSelect.disabled = true;
                } else {
                    btn.classList.remove("active");
                    numInput.disabled = false; unitSelect.disabled = false;
                }
            }

            function durationToMs(amount, unit) {
                const n = Number(amount);
                switch (unit) {
                    case "minutes": return n * 60 * 1000;
                    case "hours":   return n * 3600 * 1000;
                    case "days":    return n * 86400 * 1000;
                    case "months":  return n * 30 * 86400 * 1000;
                    case "years":   return n * 365 * 86400 * 1000;
                    default:        return n * 3600 * 1000;
                }
            }

            async function saveKeyConfig() {
                if (!configTargetKey) return;
                let expiresAt = null;
                if (!isPermanent) {
                    const amount = document.getElementById("modal-duration-num").value;
                    const unit   = document.getElementById("modal-duration-unit").value;
                    expiresAt = Date.now() + durationToMs(amount, unit);
                }
                const res = await api("/admin/api/keys/set-duration", { key: configTargetKey, expiresAt });
                if (res.ok) {
                    closeKeyConfig();
                    await loadState();
                    toast(expiresAt === null ? "Key set to permanent" : "Key duration saved");
                } else toast(res.error || "Failed to save");
            }

            // ── Announcements ────────────────────────────────────────────────
            async function loadAnnouncements() {
                try {
                    const res = await fetch("/api/announcements");
                    const data = await res.json();
                    renderAnnouncements(data.announcements || []);
                } catch (e) { /* silent */ }
            }

            function renderAnnouncements(list) {
                const el = document.getElementById("announcements-list");
                if (list.length === 0) {
                    el.innerHTML = '<div class="empty-msg">No announcements posted</div>'; return;
                }
                el.innerHTML = list.map((a, i) => `
                    <div class="ann-item-row">
                        <span class="ann-text">${a}</span>
                        <button class="revoke-btn" onclick="deleteAnnouncement(${i})">DELETE</button>
                    </div>
                `).join("");
            }

            async function addAnnouncement() {
                const input = document.getElementById("new-announcement");
                const text = input.value.trim();
                if (!text) return toast("Announcement cannot be empty");
                const res = await api("/admin/api/announcements/add", { text });
                if (res.ok) { renderAnnouncements(res.announcements); input.value = ""; toast("Announcement posted"); }
                else toast(res.error);
            }

            async function deleteAnnouncement(index) {
                const res = await api("/admin/api/announcements/delete", { index });
                if (res.ok) { renderAnnouncements(res.announcements); toast("Announcement removed"); }
                else toast(res.error);
            }

            // ── Sessions Actions ─────────────────────────────────────────────
            async function revokeSession(token) {
                const res = await api("/admin/api/sessions/revoke", { token });
                if (res.ok) { await loadState(); toast("Session revoked"); }
            }

            async function revokeAll() {
                if (!confirm("Revoke all active sessions?")) return;
                const res = await api("/admin/api/sessions/revokeAll", {});
                if (res.ok) { await loadState(); toast("All sessions revoked"); }
            }

            // ── Helpers ──────────────────────────────────────────────────────
            async function api(url, body) {
                const res = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body),
                });
                return res.json();
            }

            function toast(msg) {
                const el = document.getElementById("toast");
                el.textContent = msg; el.classList.add("show");
                setTimeout(() => el.classList.remove("show"), 2500);
            }

            // ── Chat Admin ───────────────────────────────────────────────────
            async function loadAdminChat() {
                try {
                    const res = await fetch("/api/chat");
                    const data = await res.json();
                    renderAdminChat(data.messages || []);
                } catch (e) { /* silent */ }
            }

            function renderAdminChat(msgs) {
                const el = document.getElementById("chat-admin-list");
                if (!msgs || msgs.length === 0) {
                    el.innerHTML = '<div class="empty-msg">No chat messages</div>'; return;
                }
                el.innerHTML = msgs.map((m, i) => {
                    const senderClass = m.isAdmin ? "chat-msg-sender admin-sender" : "chat-msg-sender";
                    const time = new Date(m.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    return `
                        <div class="chat-msg-row">
                            <div class="chat-msg-info">
                                <span class="${senderClass}">${m.username}</span>
                                <span class="chat-msg-body">${m.text}</span>
                                <span class="chat-msg-time">${time}</span>
                            </div>
                            <button class="revoke-btn" onclick="deleteChatMsg(${i})">DELETE</button>
                        </div>
                    `;
                }).join("");
            }

            async function deleteChatMsg(index) {
                const res = await api("/admin/api/chat/delete", { index });
                if (res.ok) { renderAdminChat(res.messages); toast("Message deleted"); }
                else toast(res.error || "Failed to delete");
            }

            async function clearChat() {
                if (!confirm("Clear all chat messages?")) return;
                const res = await api("/admin/api/chat/clear", {});
                if (res.ok) { renderAdminChat([]); toast("Chat cleared"); }
                else toast("Failed to clear chat");
            }

            // ── Init ─────────────────────────────────────────────────────────
            loadState();
            loadAnnouncements();
            loadAdminChat();
            setInterval(loadState, 15000);
            setInterval(loadAdminChat, 5000);

            document.addEventListener("DOMContentLoaded", () => {
                document.getElementById("new-password")?.addEventListener("keydown", e => {
                    if (e.key === "Enter") addPassword();
                });
                document.getElementById("new-announcement")?.addEventListener("keydown", e => {
                    if (e.key === "Enter") addAnnouncement();
                });
                document.getElementById("modal-duration-num")?.addEventListener("keydown", e => {
                    if (e.key === "Enter") saveKeyConfig();
                });
            });
        </script>
    </body>
</html>
