<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
		<title>Access Required</title>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
		<style>
			*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

			body {
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				background: #080808;
				font-family: 'Syne', system-ui, sans-serif;
				color: #e0e0e0;
				overflow: hidden;
			}

			canvas#bg {
				position: fixed;
				inset: 0;
				z-index: 0;
				pointer-events: none;
			}

			.login-card {
				position: relative;
				z-index: 1;
				background: rgba(14, 14, 14, 0.92);
				border: 1px solid rgba(255,255,255,0.07);
				border-radius: 16px;
				padding: 3rem 2.5rem 2.5rem;
				width: 100%;
				max-width: 400px;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 2rem;
				backdrop-filter: blur(20px);
				box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 32px 64px rgba(0,0,0,0.7);
			}

			.brand {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 0.6rem;
			}

			.brand-mark {
				width: 40px;
				height: 40px;
				position: relative;
			}

			.brand-mark .b1,
			.brand-mark .b2 {
				position: absolute;
				border-radius: 50%;
				width: 20px;
				height: 20px;
			}

			.brand-mark .b1 {
				top: 0; left: 0;
				background: #fff;
			}

			.brand-mark .b2 {
				bottom: 0; right: 0;
				background: rgba(255,255,255,0.25);
			}

			.brand-sub {
				font-family: 'DM Mono', monospace;
				font-size: 0.65rem;
				letter-spacing: 0.2em;
				color: #555;
				font-weight: 300;
			}

			.field-wrap {
				width: 100%;
				display: flex;
				flex-direction: column;
				gap: 0.6rem;
			}

			label {
				font-family: 'DM Mono', monospace;
				font-size: 0.65rem;
				letter-spacing: 0.18em;
				color: #555;
				font-weight: 400;
			}

			.input-row {
				display: flex;
				gap: 0.5rem;
				align-items: stretch;
			}

			input[type="password"] {
				flex: 1;
				padding: 0.8rem 1rem;
				background: #111;
				border: 1px solid rgba(255,255,255,0.08);
				border-radius: 8px;
				color: #e0e0e0;
				font-family: 'DM Mono', monospace;
				font-size: 0.95rem;
				font-weight: 300;
				outline: none;
				transition: border-color 0.2s;
			}

			input[type="password"]:focus {
				border-color: rgba(255,255,255,0.2);
			}

			input[type="password"]::placeholder {
				color: #2e2e2e;
			}

			.submit-btn {
				padding: 0 1.1rem;
				background: #fff;
				color: #000;
				border: none;
				border-radius: 8px;
				cursor: pointer;
				display: flex;
				align-items: center;
				justify-content: center;
				transition: background 0.15s, transform 0.1s;
				flex-shrink: 0;
			}

			.submit-btn:hover { background: #e2e2e2; }
			.submit-btn:active { transform: scale(0.96); }

			.error-msg {
				font-family: 'DM Mono', monospace;
				font-size: 0.75rem;
				color: #e05555;
				letter-spacing: 0.04em;
				display: none;
				padding-top: 0.1rem;
			}

			.error-msg.show { display: block; }

			.hint {
				font-family: 'DM Mono', monospace;
				font-size: 0.67rem;
				color: #2e2e2e;
				font-weight: 300;
				text-align: center;
				letter-spacing: 0.02em;
			}
		</style>
	</head>
	<body>
		<canvas id="bg"></canvas>

		<div class="login-card">
			<div class="brand">
				<div class="brand-mark">
					<span class="b1"></span>
					<span class="b2"></span>
				</div>
				<p class="brand-sub">SECURE ACCESS</p>
			</div>

			<form class="field-wrap" method="POST" action="/login">
				<label for="keyInput">ACCESS KEY</label>
				<div class="input-row">
					<input
						id="keyInput"
						name="password"
						type="password"
						placeholder="Enter your key"
						autocomplete="off"
						spellcheck="false"
						autofocus
						required
					/>
					<button type="submit" class="submit-btn" aria-label="Sign in">
						<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
							<line x1="5" y1="12" x2="19" y2="12"/>
							<polyline points="12 5 19 12 12 19"/>
						</svg>
					</button>
				</div>
				<div id="errorMsg" class="error-msg">Incorrect key. Try again.</div>
			</form>

			<p class="hint">Don't have a key? Contact the administrator.</p>
		</div>

		<script>
			if (new URLSearchParams(location.search).get("error") === "1") {
				document.getElementById("errorMsg").classList.add("show");
			}

			// Floating particle background
			const canvas = document.getElementById("bg");
			const ctx = canvas.getContext("2d");
			let W, H, dots;

			function resize() {
				W = canvas.width = window.innerWidth;
				H = canvas.height = window.innerHeight;
			}

			function initDots() {
				dots = Array.from({ length: 55 }, () => ({
					x: Math.random() * W,
					y: Math.random() * H,
					r: Math.random() * 1.4 + 0.3,
					vx: (Math.random() - 0.5) * 0.25,
					vy: (Math.random() - 0.5) * 0.25,
					a: Math.random() * 0.35 + 0.04,
				}));
			}

			function draw() {
				ctx.clearRect(0, 0, W, H);
				for (const d of dots) {
					d.x += d.vx;
					d.y += d.vy;
					if (d.x < 0) d.x = W;
					if (d.x > W) d.x = 0;
					if (d.y < 0) d.y = H;
					if (d.y > H) d.y = 0;
					ctx.beginPath();
					ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
					ctx.fillStyle = `rgba(255,255,255,${d.a})`;
					ctx.fill();
				}
				requestAnimationFrame(draw);
			}

			resize();
			initDots();
			draw();
			window.addEventListener("resize", () => { resize(); initDots(); });
		</script>
	</body>
</html>
