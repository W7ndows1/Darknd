<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
		<title>Access Required</title>
		        <link rel="icon" href="favicon.ico" />
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
		<style>
			*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

			:root {
				--bg: #06060a;
				--surface: rgba(10, 10, 18, 0.96);
				--border: rgba(255, 255, 255, 0.07);
				--border-accent: rgba(124, 90, 240, 0.35);
				--accent: #7c5af0;
				--accent-glow: rgba(124, 90, 240, 0.25);
				--text: #efefef;
				--text-muted: #555;
				--text-dim: #2a2a2a;
				--red: #f87171;
				--font-d: 'Syne', sans-serif;
				--font-m: 'DM Mono', monospace;
			}

			body {
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				background: var(--bg);
				font-family: var(--font-d);
				color: var(--text);
				overflow: hidden;
			}

			/* Grain overlay */
			body::before {
				content: '';
				position: fixed;
				inset: 0;
				background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
				pointer-events: none;
				z-index: 0;
				opacity: 0.4;
			}

			/* Animated gradient mesh */
			body::after {
				content: '';
				position: fixed;
				inset: 0;
				background:
					radial-gradient(ellipse 80% 50% at 20% 40%, rgba(124,90,240,0.08) 0%, transparent 50%),
					radial-gradient(ellipse 60% 40% at 80% 60%, rgba(124,90,240,0.05) 0%, transparent 50%);
				pointer-events: none;
				z-index: -1;
				animation: meshMove 20s ease-in-out infinite;
			}

			@keyframes meshMove {
				0%, 100% { transform: translate(0, 0) scale(1); }
				33% { transform: translate(30px, -30px) scale(1.1); }
				66% { transform: translate(-20px, 20px) scale(0.95); }
			}

			canvas#bg {
				position: fixed;
				inset: 0;
				z-index: 0;
				pointer-events: none;
			}

			/* Glow blob */
			.glow-blob {
				position: fixed;
				width: 500px;
				height: 500px;
				border-radius: 50%;
				background: radial-gradient(circle, rgba(124,90,240,0.08) 0%, transparent 70%);
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				pointer-events: none;
				z-index: 0;
				animation: pulse-blob 6s ease-in-out infinite;
			}

			@keyframes pulse-blob {
				0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
				50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
			}

			.login-card {
				position: relative;
				z-index: 1;
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: 20px;
				padding: 3rem 2.5rem 2.5rem;
				width: 100%;
				max-width: 400px;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 2rem;
				backdrop-filter: blur(24px);
				box-shadow:
					0 0 0 1px rgba(124,90,240,0.08),
					0 40px 80px rgba(0,0,0,0.8),
					0 0 60px rgba(124,90,240,0.06);
				animation: card-in 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
			}

			/* Accent top border */
			.login-card::before {
				content: '';
				position: absolute;
				top: 0; left: 10%; right: 10%;
				height: 1px;
				background: linear-gradient(90deg, transparent, var(--accent), transparent);
				opacity: 0.5;
				border-radius: 1px;
			}

			@keyframes card-in {
				from { opacity: 0; transform: translateY(24px) scale(0.97); }
				to { opacity: 1; transform: translateY(0) scale(1); }
			}

			.brand {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 0.7rem;
				animation: fade-up 0.5s ease both 0.1s;
			}

			.brand-mark {
				width: 44px;
				height: 44px;
				position: relative;
			}

			.brand-mark .b1,
			.brand-mark .b2 {
				position: absolute;
				border-radius: 50%;
				width: 22px;
				height: 22px;
				transition: all 0.3s ease;
			}

			.brand-mark .b1 {
				top: 0; left: 0;
				background: #fff;
				box-shadow: 0 0 12px rgba(255,255,255,0.5);
				animation: brand-pulse 3s ease-in-out infinite;
			}

			.brand-mark .b2 {
				bottom: 0; right: 0;
				background: #7c5af0;
				box-shadow: 0 0 16px rgba(124,90,240,0.7);
				animation: brand-pulse 3s ease-in-out infinite reverse;
			}

			.brand-sub {
				font-family: var(--font-m);
				font-size: 0.6rem;
				letter-spacing: 0.28em;
				color: var(--text-muted);
				font-weight: 300;
			}

			.field-wrap {
				width: 100%;
				display: flex;
				flex-direction: column;
				gap: 0.7rem;
				animation: fade-up 0.5s ease both 0.2s;
			}

			label {
				font-family: var(--font-m);
				font-size: 0.6rem;
				letter-spacing: 0.22em;
				color: var(--text-muted);
				font-weight: 400;
			}

			.input-row {
				display: flex;
				gap: 0.5rem;
				align-items: stretch;
			}

			input[type="password"] {
				flex: 1;
				padding: 0.85rem 1rem;
				background: rgba(255,255,255,0.03);
				border: 1px solid var(--border);
				border-radius: 10px;
				color: var(--text);
				font-family: var(--font-m);
				font-size: 0.95rem;
				font-weight: 300;
				outline: none;
				transition: border-color 0.25s, box-shadow 0.25s;
				letter-spacing: 0.1em;
			}

			input[type="password"]:focus {
				border-color: rgba(124,90,240,0.5);
				box-shadow: 0 0 0 3px rgba(124,90,240,0.1);
			}

			input[type="password"]::placeholder {
				color: var(--text-dim);
				letter-spacing: 0.02em;
			}

			.submit-btn {
				padding: 0 1.1rem;
				background: var(--accent);
				color: #fff;
				border: none;
				border-radius: 10px;
				cursor: pointer;
				display: flex;
				align-items: center;
				justify-content: center;
				transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
				flex-shrink: 0;
				position: relative;
				overflow: hidden;
				box-shadow: 0 4px 20px rgba(124,90,240,0.35);
			}

			.submit-btn:hover {
				background: #9b7ef8;
				box-shadow: 0 4px 28px rgba(124,90,240,0.55);
			}
			.submit-btn:active { transform: scale(0.95); }

			.error-msg {
				font-family: var(--font-m);
				font-size: 0.72rem;
				color: var(--red);
				letter-spacing: 0.04em;
				display: none;
				padding-top: 0.1rem;
			}

			.error-msg.show { display: block; animation: shake 0.5s ease; }

			@keyframes shake {
				0%, 100% { transform: translateX(0); }
				20%, 60% { transform: translateX(-5px); }
				40%, 80% { transform: translateX(5px); }
			}

			/* Typing cursor animation */
			.brand-sub {
				font-family: var(--font-m);
				font-size: 0.6rem;
				letter-spacing: 0.28em;
				color: var(--text-muted);
				font-weight: 300;
				position: relative;
			}

			.brand-sub::after {
				content: '';
				position: absolute;
				right: -8px;
				top: 50%;
				transform: translateY(-50%);
				width: 2px;
				height: 1em;
				background: var(--accent);
				animation: blink 1s step-end infinite;
			}

			@keyframes blink {
				0%, 100% { opacity: 1; }
				50% { opacity: 0; }
			}

			/* Card glow effect on focus */
			.login-card:focus-within {
				box-shadow:
					0 0 0 1px rgba(124,90,240,0.15),
					0 50px 100px rgba(0,0,0,0.9),
					0 0 80px rgba(124,90,240,0.12);
			}

			.hint {
				font-family: var(--font-m);
				font-size: 0.64rem;
				color: #2a2a2a;
				font-weight: 300;
				text-align: center;
				letter-spacing: 0.04em;
				animation: fade-up 0.5s ease both 0.3s;
			}

			/* Ripple */
			.ripple-wave {
				position: absolute;
				border-radius: 50%;
				background: rgba(255,255,255,0.25);
				transform: scale(0);
				animation: ripple-go 0.55s ease-out forwards;
				pointer-events: none;
			}
			@keyframes ripple-go {
				to { transform: scale(3); opacity: 0; }
			}

			@keyframes fade-up {
				from { opacity: 0; transform: translateY(10px); }
				to { opacity: 1; transform: translateY(0); }
			}
		</style>
	</head>
	<body>
		<canvas id="bg"></canvas>
		<div class="glow-blob"></div>

		<div class="login-card">
			<div class="brand">
				<div class="brand-mark" style="display:flex;">
					<span class="b1"></span>
					<span class="b2"></span>
				</div>
				<p class="brand-sub">SECURE ACCESS</p>
			</div>

			<form class="field-wrap" method="POST" action="/login">
				<label for="keyInput">ACCESS KEY</label>
				<div class="input-row">
					<input
						id="keyInput"
						name="password"
						type="password"
						placeholder="Enter your key"
						autocomplete="off"
						spellcheck="false"
						autofocus
						required
					/>
					<button type="submit" class="submit-btn" aria-label="Sign in">
						<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
							<line x1="5" y1="12" x2="19" y2="12"/>
							<polyline points="12 5 19 12 12 19"/>
						</svg>
					</button>
				</div>
				<div id="errorMsg" class="error-msg">Incorrect key. Try again.</div>
			</form>

			<p class="hint">Don't have a key? Contact the administrator.</p>
		</div>

		<script>
			const urlParams = new URLSearchParams(location.search);
			if (urlParams.get("error") === "1") {
				document.getElementById("errorMsg").classList.add("show");
			}
			if (urlParams.get("expired") === "1") {
				const errMsg = document.getElementById("errorMsg");
				errMsg.textContent = "Session expired. Please log in again.";
				errMsg.classList.add("show");
			}

			// Enhanced particle background with constellation lines
			const canvas = document.getElementById("bg");
			const ctx = canvas.getContext("2d");
			let W, H, dots;
			let mouse = { x: null, y: null };
			const CONNECTION_DISTANCE = 100;
			const MOUSE_CONNECTION_DISTANCE = 150;

			function resize() {
				W = canvas.width = window.innerWidth;
				H = canvas.height = window.innerHeight;
			}

			function initDots() {
				const particleCount = window.innerWidth < 768 ? 35 : 55;
				dots = Array.from({ length: particleCount }, () => ({
					x: Math.random() * W,
					y: Math.random() * H,
					r: Math.random() * 1.4 + 0.3,
					vx: (Math.random() - 0.5) * 0.25,
					vy: (Math.random() - 0.5) * 0.25,
					a: Math.random() * 0.35 + 0.04,
					pulse: Math.random() * Math.PI * 2,
				}));
			}

			// Mouse tracking
			window.addEventListener('mousemove', (e) => {
				mouse.x = e.clientX;
				mouse.y = e.clientY;
			});

			window.addEventListener('mouseleave', () => {
				mouse.x = null;
				mouse.y = null;
			});

			function drawConstellationLines() {
				for (let i = 0; i < dots.length; i++) {
					for (let j = i + 1; j < dots.length; j++) {
						const dx = dots[i].x - dots[j].x;
						const dy = dots[i].y - dots[j].y;
						const dist = Math.sqrt(dx * dx + dy * dy);

						if (dist < CONNECTION_DISTANCE) {
							const opacity = (1 - dist / CONNECTION_DISTANCE) * 0.15;
							ctx.beginPath();
							ctx.moveTo(dots[i].x, dots[i].y);
							ctx.lineTo(dots[j].x, dots[j].y);
							ctx.strokeStyle = `rgba(124,90,240,${opacity})`;
							ctx.lineWidth = 0.5;
							ctx.stroke();
						}
					}

					if (mouse.x !== null && mouse.y !== null) {
						const dx = dots[i].x - mouse.x;
						const dy = dots[i].y - mouse.y;
						const dist = Math.sqrt(dx * dx + dy * dy);

						if (dist < MOUSE_CONNECTION_DISTANCE) {
							const opacity = (1 - dist / MOUSE_CONNECTION_DISTANCE) * 0.3;
							ctx.beginPath();
							ctx.moveTo(dots[i].x, dots[i].y);
							ctx.lineTo(mouse.x, mouse.y);
							ctx.strokeStyle = `rgba(124,90,240,${opacity})`;
							ctx.lineWidth = 0.8;
							ctx.stroke();
						}
					}
				}
			}

			function draw() {
				ctx.clearRect(0, 0, W, H);
				drawConstellationLines();

				for (const d of dots) {
					d.x += d.vx;
					d.y += d.vy;
					if (d.x < 0) d.x = W;
					if (d.x > W) d.x = 0;
					if (d.y < 0) d.y = H;
					if (d.y > H) d.y = 0;

					d.pulse += 0.02;
					const pulseFactor = 1 + Math.sin(d.pulse) * 0.2;

					ctx.beginPath();
					ctx.arc(d.x, d.y, d.r * pulseFactor, 0, Math.PI * 2);
					ctx.fillStyle = `rgba(255,255,255,${d.a})`;
					ctx.fill();

					if (d.r > 1.2) {
						ctx.beginPath();
						ctx.arc(d.x, d.y, d.r * pulseFactor * 3, 0, Math.PI * 2);
						ctx.fillStyle = `rgba(255,255,255,${d.a * 0.1})`;
						ctx.fill();
					}
				}
				requestAnimationFrame(draw);
			}

			resize();
			initDots();
			draw();
			window.addEventListener("resize", () => { resize(); initDots(); });

			// Ripple
			document.querySelectorAll('.submit-btn').forEach(btn => {
				btn.addEventListener('click', function(e) {
					const r = document.createElement('span');
					r.className = 'ripple-wave';
					const rect = btn.getBoundingClientRect();
					const size = Math.max(rect.width, rect.height);
					r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
					btn.appendChild(r);
					setTimeout(() => r.remove(), 600);
				});
			});

			// 3D Parallax tilt effect for login card
			const card = document.querySelector('.login-card');
			let cardTiltTimeout;

			document.addEventListener('mousemove', function(e) {
				if (window.innerWidth < 768) return;

				clearTimeout(cardTiltTimeout);

				const rect = card.getBoundingClientRect();
				const x = e.clientX - rect.left - rect.width / 2;
				const y = e.clientY - rect.top - rect.height / 2;

				const rotateX = (y / (rect.height / 2)) * -3;
				const rotateY = (x / (rect.width / 2)) * 3;

				card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(10px)`;

				cardTiltTimeout = setTimeout(() => {
					card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) translateZ(0px)';
				}, 100);
			});

			card.style.transition = 'transform 0.15s ease-out';

			// Click particle burst
			document.addEventListener('click', function(e) {
				if (e.target.closest('button, input, .login-card')) return;

				const colors = ['#7c5af0', '#ffffff', '#9b7ef8'];
				for (let i = 0; i < 6; i++) {
					const particle = document.createElement('div');
					particle.style.cssText = `
						position: fixed;
						left: ${e.clientX}px;
						top: ${e.clientY}px;
						width: 4px;
						height: 4px;
						background: ${colors[Math.floor(Math.random() * colors.length)]};
						border-radius: 50%;
						pointer-events: none;
						z-index: 9999;
					`;
					document.body.appendChild(particle);

					const angle = (Math.PI * 2 * i) / 6;
					const velocity = 40 + Math.random() * 30;
					const tx = Math.cos(angle) * velocity;
					const ty = Math.sin(angle) * velocity;

					particle.animate([
						{ transform: 'translate(0,0) scale(1)', opacity: 1 },
						{ transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
					], {
						duration: 500,
						easing: 'ease-out'
					}).onfinish = () => particle.remove();
				}
			});
		</script>
	</body>
</html>
