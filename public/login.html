<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
		<title>Access Required</title>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
		<style>
			*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

			:root {
				--bg: #06060a;
				--surface: rgba(10, 10, 18, 0.96);
				--border: rgba(255, 255, 255, 0.07);
				--border-accent: rgba(124, 90, 240, 0.35);
				--accent: #7c5af0;
				--accent-glow: rgba(124, 90, 240, 0.25);
				--text: #efefef;
				--text-muted: #555;
				--text-dim: #2a2a2a;
				--red: #f87171;
				--font-d: 'Syne', sans-serif;
				--font-m: 'DM Mono', monospace;
			}

			body {
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				background: var(--bg);
				font-family: var(--font-d);
				color: var(--text);
				overflow: hidden;
			}

			/* Grain overlay */
			body::before {
				content: '';
				position: fixed;
				inset: 0;
				background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
				pointer-events: none;
				z-index: 0;
				opacity: 0.4;
			}

			canvas#bg {
				position: fixed;
				inset: 0;
				z-index: 0;
				pointer-events: none;
			}

			/* Glow blob */
			.glow-blob {
				position: fixed;
				width: 500px;
				height: 500px;
				border-radius: 50%;
				background: radial-gradient(circle, rgba(124,90,240,0.08) 0%, transparent 70%);
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				pointer-events: none;
				z-index: 0;
				animation: pulse-blob 6s ease-in-out infinite;
			}

			@keyframes pulse-blob {
				0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
				50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
			}

			.login-card {
				position: relative;
				z-index: 1;
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: 20px;
				padding: 3rem 2.5rem 2.5rem;
				width: 100%;
				max-width: 400px;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 2rem;
				backdrop-filter: blur(24px);
				box-shadow:
					0 0 0 1px rgba(124,90,240,0.08),
					0 40px 80px rgba(0,0,0,0.8),
					0 0 60px rgba(124,90,240,0.06);
				animation: card-in 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
			}

			/* Accent top border */
			.login-card::before {
				content: '';
				position: absolute;
				top: 0; left: 10%; right: 10%;
				height: 1px;
				background: linear-gradient(90deg, transparent, var(--accent), transparent);
				opacity: 0.5;
				border-radius: 1px;
			}

			@keyframes card-in {
				from { opacity: 0; transform: translateY(24px) scale(0.97); }
				to { opacity: 1; transform: translateY(0) scale(1); }
			}

			.brand {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 0.7rem;
				animation: fade-up 0.5s ease both 0.1s;
			}

			.brand-mark {
				width: 44px;
				height: 44px;
				position: relative;
			}

			.brand-mark .b1,
			.brand-mark .b2 {
				position: absolute;
				border-radius: 50%;
				width: 22px;
				height: 22px;
				transition: all 0.3s ease;
			}

			.brand-mark .b1 {
				top: 0; left: 0;
				background: #fff;
				box-shadow: 0 0 12px rgba(255,255,255,0.3);
			}

			.brand-mark .b2 {
				bottom: 0; right: 0;
				background: var(--accent);
				box-shadow: 0 0 14px var(--accent-glow);
			}

			.brand-sub {
				font-family: var(--font-m);
				font-size: 0.6rem;
				letter-spacing: 0.28em;
				color: var(--text-muted);
				font-weight: 300;
			}

			.field-wrap {
				width: 100%;
				display: flex;
				flex-direction: column;
				gap: 0.7rem;
				animation: fade-up 0.5s ease both 0.2s;
			}

			label {
				font-family: var(--font-m);
				font-size: 0.6rem;
				letter-spacing: 0.22em;
				color: var(--text-muted);
				font-weight: 400;
			}

			.input-row {
				display: flex;
				gap: 0.5rem;
				align-items: stretch;
			}

			input[type="password"] {
				flex: 1;
				padding: 0.85rem 1rem;
				background: rgba(255,255,255,0.03);
				border: 1px solid var(--border);
				border-radius: 10px;
				color: var(--text);
				font-family: var(--font-m);
				font-size: 0.95rem;
				font-weight: 300;
				outline: none;
				transition: border-color 0.25s, box-shadow 0.25s;
				letter-spacing: 0.1em;
			}

			input[type="password"]:focus {
				border-color: rgba(124,90,240,0.5);
				box-shadow: 0 0 0 3px rgba(124,90,240,0.1);
			}

			input[type="password"]::placeholder {
				color: var(--text-dim);
				letter-spacing: 0.02em;
			}

			.submit-btn {
				padding: 0 1.1rem;
				background: var(--accent);
				color: #fff;
				border: none;
				border-radius: 10px;
				cursor: pointer;
				display: flex;
				align-items: center;
				justify-content: center;
				transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
				flex-shrink: 0;
				position: relative;
				overflow: hidden;
				box-shadow: 0 4px 20px rgba(124,90,240,0.35);
			}

			.submit-btn:hover {
				background: #9b7ef8;
				box-shadow: 0 4px 28px rgba(124,90,240,0.55);
			}
			.submit-btn:active { transform: scale(0.95); }

			.error-msg {
				font-family: var(--font-m);
				font-size: 0.72rem;
				color: var(--red);
				letter-spacing: 0.04em;
				display: none;
				padding-top: 0.1rem;
			}

			.error-msg.show { display: block; }

			.hint {
				font-family: var(--font-m);
				font-size: 0.64rem;
				color: #2a2a2a;
				font-weight: 300;
				text-align: center;
				letter-spacing: 0.04em;
				animation: fade-up 0.5s ease both 0.3s;
			}

			/* Ripple */
			.ripple-wave {
				position: absolute;
				border-radius: 50%;
				background: rgba(255,255,255,0.25);
				transform: scale(0);
				animation: ripple-go 0.55s ease-out forwards;
				pointer-events: none;
			}
			@keyframes ripple-go {
				to { transform: scale(3); opacity: 0; }
			}

			@keyframes fade-up {
				from { opacity: 0; transform: translateY(10px); }
				to { opacity: 1; transform: translateY(0); }
			}
		</style>
	</head>
	<body>
		<canvas id="bg"></canvas>
		<div class="glow-blob"></div>

		<div class="login-card">
			<div class="brand">
				<div class="brand-mark">
					<span class="b1"></span>
					<span class="b2"></span>
				</div>
				<p class="brand-sub">SECURE ACCESS</p>
			</div>

			<form class="field-wrap" method="POST" action="/login">
				<label for="keyInput">ACCESS KEY</label>
				<div class="input-row">
					<input
						id="keyInput"
						name="password"
						type="password"
						placeholder="Enter your key"
						autocomplete="off"
						spellcheck="false"
						autofocus
						required
					/>
					<button type="submit" class="submit-btn" aria-label="Sign in">
						<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
							<line x1="5" y1="12" x2="19" y2="12"/>
							<polyline points="12 5 19 12 12 19"/>
						</svg>
					</button>
				</div>
				<div id="errorMsg" class="error-msg">Incorrect key. Try again.</div>
			</form>

			<p class="hint">Don't have a key? Contact the administrator.</p>
		</div>

		<script>
			if (new URLSearchParams(location.search).get("error") === "1") {
				document.getElementById("errorMsg").classList.add("show");
			}

			// Floating particle background
			const canvas = document.getElementById("bg");
			const ctx = canvas.getContext("2d");
			let W, H, dots;

			function resize() {
				W = canvas.width = window.innerWidth;
				H = canvas.height = window.innerHeight;
			}

			function initDots() {
				dots = Array.from({ length: 55 }, () => ({
					x: Math.random() * W,
					y: Math.random() * H,
					r: Math.random() * 1.4 + 0.3,
					vx: (Math.random() - 0.5) * 0.25,
					vy: (Math.random() - 0.5) * 0.25,
					a: Math.random() * 0.35 + 0.04,
				}));
			}

			function draw() {
				ctx.clearRect(0, 0, W, H);
				for (const d of dots) {
					d.x += d.vx;
					d.y += d.vy;
					if (d.x < 0) d.x = W;
					if (d.x > W) d.x = 0;
					if (d.y < 0) d.y = H;
					if (d.y > H) d.y = 0;
					ctx.beginPath();
					ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
					ctx.fillStyle = `rgba(255,255,255,${d.a})`;
					ctx.fill();
				}
				requestAnimationFrame(draw);
			}

			resize();
			initDots();
			draw();
			window.addEventListener("resize", () => { resize(); initDots(); });

			// Ripple
			document.querySelectorAll('.submit-btn').forEach(btn => {
				btn.addEventListener('click', function(e) {
					const r = document.createElement('span');
					r.className = 'ripple-wave';
					const rect = btn.getBoundingClientRect();
					const size = Math.max(rect.width, rect.height);
					r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
					btn.appendChild(r);
					setTimeout(() => r.remove(), 600);
				});
			});
		</script>
	</body>
</html>
