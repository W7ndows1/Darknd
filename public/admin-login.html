<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Admin — Darknd</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
        <style>
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
            body {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #080808;
                font-family: 'Syne', system-ui, sans-serif;
                color: #e0e0e0;
                position: relative;
            }

            /* Home Button Styling */
            .home-link {
                position: absolute;
                top: 25px;
                left: 25px;
                color: rgba(255, 255, 255, 0.2);
                transition: all 0.3s ease;
                text-decoration: none;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 8px;
                border: 1px solid rgba(255, 255, 255, 0.05);
                border-radius: 8px;
            }

            .home-link:hover {
                color: #fff;
                background: rgba(255, 255, 255, 0.03);
                border-color: rgba(255, 255, 255, 0.2);
                transform: scale(1.05);
            }

            .card {
                background: rgba(14,14,14,0.95);
                border: 1px solid rgba(255,255,255,0.07);
                border-radius: 16px;
                padding: 3rem 2.5rem 2.5rem;
                width: 100%;
                max-width: 400px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 2rem;
                box-shadow: 0 32px 64px rgba(0,0,0,0.7);
            }
            .brand { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
            .brand-mark { width: 40px; height: 40px; position: relative; }
            .brand-mark .b1, .brand-mark .b2 { position: absolute; border-radius: 50%; width: 20px; height: 20px; }
            .brand-mark .b1 { top: 0; left: 0; background: #fff; }
            .brand-mark .b2 { bottom: 0; right: 0; background: rgba(255,255,255,0.25); }
            .brand-sub { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.2em; color: #555; font-weight: 300; }
            .field-wrap { width: 100%; display: flex; flex-direction: column; gap: 0.6rem; }
            label { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.18em; color: #555; }
            .input-row { display: flex; gap: 0.5rem; }
            input[type="password"] {
                flex: 1; padding: 0.8rem 1rem;
                background: #111; border: 1px solid rgba(255,255,255,0.08);
                border-radius: 8px; color: #e0e0e0;
                font-family: 'DM Mono', monospace; font-size: 0.95rem; outline: none;
                transition: border-color 0.2s;
            }
            input[type="password"]:focus { border-color: rgba(255,255,255,0.2); }
            input[type="password"]::placeholder { color: #2e2e2e; }
            .submit-btn {
                padding: 0 1.1rem; background: #fff; color: #000;
                border: none; border-radius: 8px; cursor: pointer;
                display: flex; align-items: center; justify-content: center;
                transition: background 0.15s;
            }
            .submit-btn:hover { background: #e2e2e2; }
            .error { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: #e05555; display: none; }
            .error.show { display: block; }
            .hint { font-family: 'DM Mono', monospace; font-size: 0.67rem; color: #2e2e2e; text-align: center; }
        </style>
    </head>
    <body>
        <a href="/" class="home-link" title="Back to Home">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
        </a>

        <div class="card">
            <div class="brand">
                <div class="brand-mark"><span class="b1"></span><span class="b2"></span></div>
                <p class="brand-sub">ADMIN ACCESS</p>
            </div>
            <form class="field-wrap" method="POST" action="/admin/login">
                <label for="pw">ADMIN KEY</label>
                <div class="input-row">
                    <input id="pw" name="password" type="password" placeholder="Enter admin key" autofocus required />
                    <button type="submit" class="submit-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <line x1="5" y1="12" x2="19" y2="12"/>
                            <polyline points="12 5 19 12 12 19"/>
                        </svg>
                    </button>
                </div>
                <div class="error" id="err">Incorrect admin key.</div>
            </form>
            <p class="hint">Restricted area.</p>
        </div>
        <script>
            if (new URLSearchParams(location.search).get("error") === "1")
                document.getElementById("err").classList.add("show");
        </script>
    </body>
</html>
