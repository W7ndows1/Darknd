<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Admin — Darknd</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
        <style>
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

            :root {
                --bg: #06060a;
                --surface: rgba(10, 10, 18, 0.96);
                --border: rgba(255, 255, 255, 0.07);
                --accent: #f87171;
                --accent-glow: rgba(248, 113, 113, 0.25);
                --text: #efefef;
                --text-muted: #555;
                --text-dim: #2a2a2a;
                --font-d: 'Syne', sans-serif;
                --font-m: 'DM Mono', monospace;
            }

            body {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--bg);
                font-family: var(--font-d);
                color: var(--text);
                position: relative;
                overflow: hidden;
            }

            /* Subtle grid */
            body::after {
                content: '';
                position: fixed;
                inset: 0;
                background-image:
                    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
                background-size: 48px 48px;
                pointer-events: none;
                z-index: 0;
            }

            /* Red glow for admin */
            .glow-blob {
                position: fixed;
                width: 400px;
                height: 400px;
                border-radius: 50%;
                background: radial-gradient(circle, rgba(248,113,113,0.07) 0%, transparent 70%);
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                pointer-events: none;
                z-index: 0;
                animation: pulse-blob 5s ease-in-out infinite;
            }

            @keyframes pulse-blob {
                0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
                50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            }

            .home-link {
                position: absolute;
                top: 24px;
                left: 24px;
                color: rgba(255, 255, 255, 0.18);
                transition: all 0.25s ease;
                text-decoration: none;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 8px;
                border: 1px solid rgba(255, 255, 255, 0.06);
                border-radius: 9px;
                z-index: 2;
            }

            .home-link:hover {
                color: #fff;
                background: rgba(255, 255, 255, 0.04);
                border-color: rgba(255, 255, 255, 0.15);
                transform: scale(1.05);
            }

            .card {
                position: relative;
                z-index: 1;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 20px;
                padding: 3rem 2.5rem 2.5rem;
                width: 100%;
                max-width: 400px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 2rem;
                backdrop-filter: blur(24px);
                box-shadow:
                    0 0 0 1px rgba(248,113,113,0.07),
                    0 40px 80px rgba(0,0,0,0.8),
                    0 0 60px rgba(248,113,113,0.05);
                animation: card-in 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
            }

            /* Red accent top border */
            .card::before {
                content: '';
                position: absolute;
                top: 0; left: 10%; right: 10%;
                height: 1px;
                background: linear-gradient(90deg, transparent, var(--accent), transparent);
                opacity: 0.45;
                border-radius: 1px;
            }

            @keyframes card-in {
                from { opacity: 0; transform: translateY(24px) scale(0.97); }
                to { opacity: 1; transform: translateY(0) scale(1); }
            }

            .brand {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 0.6rem;
                animation: fade-up 0.4s ease both 0.1s;
            }

            .brand-mark { width: 44px; height: 44px; position: relative; }

            .brand-mark .b1, .brand-mark .b2 {
                position: absolute;
                border-radius: 50%;
                width: 22px;
                height: 22px;
            }

            .brand-mark .b1 {
                top: 0; left: 0;
                background: #fff;
                box-shadow: 0 0 10px rgba(255,255,255,0.25);
            }

            .brand-mark .b2 {
                bottom: 0; right: 0;
                background: var(--accent);
                box-shadow: 0 0 14px var(--accent-glow);
            }

            .brand-sub {
                font-family: var(--font-m);
                font-size: 0.6rem;
                letter-spacing: 0.28em;
                color: var(--text-muted);
                font-weight: 300;
            }

            .field-wrap {
                width: 100%;
                display: flex;
                flex-direction: column;
                gap: 0.7rem;
                animation: fade-up 0.4s ease both 0.2s;
            }

            label {
                font-family: var(--font-m);
                font-size: 0.6rem;
                letter-spacing: 0.22em;
                color: var(--text-muted);
            }

            .input-row { display: flex; gap: 0.5rem; }

            input[type="password"] {
                flex: 1;
                padding: 0.85rem 1rem;
                background: rgba(255,255,255,0.03);
                border: 1px solid var(--border);
                border-radius: 10px;
                color: var(--text);
                font-family: var(--font-m);
                font-size: 0.95rem;
                outline: none;
                transition: border-color 0.25s, box-shadow 0.25s;
                letter-spacing: 0.1em;
            }

            input[type="password"]:focus {
                border-color: rgba(248,113,113,0.45);
                box-shadow: 0 0 0 3px rgba(248,113,113,0.1);
            }

            input[type="password"]::placeholder { color: var(--text-dim); }

            .submit-btn {
                padding: 0 1.1rem;
                background: var(--accent);
                color: #fff;
                border: none;
                border-radius: 10px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
                position: relative;
                overflow: hidden;
                box-shadow: 0 4px 20px rgba(248,113,113,0.3);
            }

            .submit-btn:hover {
                background: #fc8585;
                box-shadow: 0 4px 28px rgba(248,113,113,0.5);
            }
            .submit-btn:active { transform: scale(0.95); }

            .error {
                font-family: var(--font-m);
                font-size: 0.72rem;
                color: var(--accent);
                display: none;
            }
            .error.show { display: block; }

            .hint {
                font-family: var(--font-m);
                font-size: 0.64rem;
                color: #222;
                text-align: center;
                animation: fade-up 0.4s ease both 0.3s;
            }

            .ripple-wave {
                position: absolute;
                border-radius: 50%;
                background: rgba(255,255,255,0.25);
                transform: scale(0);
                animation: ripple-go 0.55s ease-out forwards;
                pointer-events: none;
            }
            @keyframes ripple-go {
                to { transform: scale(3); opacity: 0; }
            }

            @keyframes fade-up {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
        </style>
    </head>
    <body>
        <div class="glow-blob"></div>

        <a href="/" class="home-link" title="Back to Home">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
        </a>

        <div class="card">
            <div class="brand">
                <div class="brand-mark"><span class="b1"></span><span class="b2"></span></div>
                <p class="brand-sub">ADMIN ACCESS</p>
            </div>
            <form class="field-wrap" method="POST" action="/admin/login">
                <label for="pw">ADMIN KEY</label>
                <div class="input-row">
                    <input id="pw" name="password" type="password" placeholder="Enter admin key" autofocus required />
                    <button type="submit" class="submit-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <line x1="5" y1="12" x2="19" y2="12"/>
                            <polyline points="12 5 19 12 12 19"/>
                        </svg>
                    </button>
                </div>
                <div class="error" id="err">Incorrect admin key.</div>
            </form>
            <p class="hint">Restricted area.</p>
        </div>

        <script>
            if (new URLSearchParams(location.search).get("error") === "1")
                document.getElementById("err").classList.add("show");

            document.querySelectorAll('.submit-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    const r = document.createElement('span');
                    r.className = 'ripple-wave';
                    const rect = btn.getBoundingClientRect();
                    const size = Math.max(rect.width, rect.height);
                    r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
                    btn.appendChild(r);
                    setTimeout(() => r.remove(), 600);
                });
            });
        </script>
    </body>
</html>
