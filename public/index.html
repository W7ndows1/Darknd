<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖤</text></svg>" />
        <title>Darknd</title>

        <script src="/scram/scramjet.all.js"></script>
        <script src="/baremux/index.js"></script>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="index.css" />
        <script src="register-sw.js" defer></script>
        <script src="search.js" defer></script>
        <script src="index.js" defer></script>
    </head>

    <body>
        <!-- Admin link -->
        <a href="/admin" class="admin-shield" id="admin-link" title="Admin Panel">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
        </a>

        <canvas id="bg"></canvas>

        <!-- Announcement stack -->
        <div id="ann-stack"></div>

        <!-- Chat bubble -->
        <div id="chat-bubble" onclick="toggleDrawer()" title="Open Chat">
            <div id="chat-unread"></div>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
        </div>

        <!-- Chat Drawer -->
        <div id="chat-drawer">
            <div class="drawer-header">
                <div class="drawer-header-left">
                    <span class="chat-dot"></span>
                    <span class="drawer-title">LIVE CHAT</span>
                </div>
                <button class="drawer-close" onclick="toggleDrawer()">✕</button>
            </div>
            <div class="drawer-messages" id="chat-messages">
                <div class="chat-empty">No messages yet</div>
            </div>
            <div class="drawer-username-row">
                <span class="drawer-username-label">Chatting as:</span>
                <input class="drawer-username-input" id="username-display" type="text" maxlength="20" value="Anonymous" title="Click to change username" />
            </div>
            <div class="drawer-input-row">
                <input class="drawer-input" id="chat-input" type="text" placeholder="Message..." maxlength="300" />
                <button class="drawer-send-btn" onclick="sendMessage()">→</button>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="settings-modal" onclick="handleSettingsOverlay(event)">
            <div id="settings-card">
                <div class="settings-header">
                    <span class="settings-title">SETTINGS</span>
                    <button class="settings-close" onclick="closeSettings()">✕</button>
                </div>

                <!-- Theme -->
                <div class="settings-section">
                    <span class="settings-label">THEME</span>
                    <div class="theme-grid">
                        <button class="theme-option active" data-theme="midnight" onclick="setTheme('midnight')">
                            <span class="theme-swatch" style="background:#fff"></span>
                            Midnight
                        </button>
                        <button class="theme-option" data-theme="neon" onclick="setTheme('neon')">
                            <span class="theme-swatch" style="background:#00ff88"></span>
                            Neon
                        </button>
                        <button class="theme-option" data-theme="nord" onclick="setTheme('nord')">
                            <span class="theme-swatch" style="background:#88c0d0"></span>
                            Nord
                        </button>
                        <button class="theme-option" data-theme="dracula" onclick="setTheme('dracula')">
                            <span class="theme-swatch" style="background:#bd93f9"></span>
                            Dracula
                        </button>
                    </div>
                </div>

                <!-- Background -->
                <div class="settings-section">
                    <span class="settings-label">BACKGROUND</span>
                    <div class="bg-options">
                        <button class="bg-option active" data-bg="particles" onclick="setBg('particles')">Particles</button>
                        <button class="bg-option" data-bg="solid" onclick="setBg('solid')">Solid</button>
                        <button class="bg-option" data-bg="image" onclick="setBg('image')">Image</button>
                    </div>
                    <input class="settings-input" id="bg-image-url" type="text" placeholder="Image URL (for Image mode)..." />
                    <button class="settings-action-btn" onclick="applyBgImage()">Apply Image URL</button>
                </div>

                <!-- Search engine -->
                <div class="settings-section">
                    <span class="settings-label">SEARCH ENGINE</span>
                    <select class="settings-select" id="search-engine-select" onchange="setSearchEngine(this.value)">
                        <option value="https://www.google.com/search?q=%s">Google</option>
                        <option value="https://duckduckgo.com/?q=%s">DuckDuckGo</option>
                        <option value="https://www.bing.com/search?q=%s">Bing</option>
                        <option value="https://search.brave.com/search?q=%s">Brave Search</option>
                        <option value="https://yandex.com/search/?text=%s">Yandex</option>
                    </select>
                </div>

                <!-- Bookmarks -->
                <div class="settings-section">
                    <span class="settings-label">BOOKMARKS</span>
                    <div class="bookmarks-list" id="bookmarks-list">
                        <div class="bookmark-empty">No bookmarks saved</div>
                    </div>
                    <div class="settings-btn-row">
                        <button class="settings-action-btn" onclick="addBookmark()">+ Bookmark Current Input</button>
                    </div>
                </div>
            </div>
        </div>

        <main>
            <div class="brand">
                <div class="brand-mark">
                    <span class="b1"></span>
                    <span class="b2"></span>
                </div>
                <p class="brand-sub">SECURE ACCESS</p>
            </div>

            <h1 class="headline">Where to?</h1>

            <form id="sj-form" class="search-wrap">
                <input id="sj-search-engine" value="https://www.google.com/search?q=%s" type="hidden" />
                <input id="sj-address" type="text" placeholder="Search or enter a URL..." autocomplete="off" spellcheck="false" />
                <div id="autocomplete-list"></div>
                <button type="submit" class="go-btn" aria-label="Go">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="5" y1="12" x2="19" y2="12"/>
                        <polyline points="12 5 19 12 12 19"/>
                    </svg>
                </button>
            </form>

            <!-- Tab Bar -->
            <div class="tab-bar">
                <button class="tab-btn" onclick="tabNavigate('play.geforcenow.com')">
                    <img src="https://play.geforcenow.com/favicon.ico" alt="" onerror="this.style.display='none'" />
                    GeForce Now
                </button>
                <div class="tab-bar-divider"></div>
                <button class="tab-btn" onclick="tabNavigate('duckduckgo.com')">
                    <img src="https://duckduckgo.com/favicon.ico" alt="" onerror="this.style.display='none'" />
                    DuckDuckGo
                </button>
                <div class="tab-bar-divider"></div>
                <button class="cloaker-btn" onclick="openCloaker()" title="Open proxy in about:blank window">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                    </svg>
                    Cloaker
                </button>
            </div>

            <div class="error-wrap">
                <p id="sj-error"></p>
                <pre id="sj-error-code"></pre>
            </div>
        </main>

        <footer>
            <form method="POST" action="/logout" style="margin:0">
                <button type="submit" class="logout-btn">LOGOUT</button>
            </form>
            <button id="settings-trigger" onclick="openSettings()" title="Settings">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </button>
        </footer>

        <script>
        // ════════════════════════════════════════════════════════
        // PARTICLE BACKGROUND
        // ════════════════════════════════════════════════════════
        const canvas = document.getElementById("bg");
        const ctx = canvas.getContext("2d");
        let W, H, dots;

        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        function initDots() {
            dots = Array.from({ length: 55 }, () => ({
                x: Math.random() * W, y: Math.random() * H,
                r: Math.random() * 1.4 + 0.3,
                vx: (Math.random() - 0.5) * 0.25, vy: (Math.random() - 0.5) * 0.25,
                a: Math.random() * 0.35 + 0.04,
            }));
        }

        function getParticleColor() {
            const style = getComputedStyle(document.documentElement);
            return style.getPropertyValue("--particle-color").trim() || "255,255,255";
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            const col = getParticleColor();
            for (const d of dots) {
                d.x += d.vx; d.y += d.vy;
                if (d.x < 0) d.x = W; if (d.x > W) d.x = 0;
                if (d.y < 0) d.y = H; if (d.y > H) d.y = 0;
                ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${col},${d.a})`; ctx.fill();
            }
            requestAnimationFrame(draw);
        }

        resize(); initDots(); draw();
        window.addEventListener("resize", () => { resize(); initDots(); });

        // ════════════════════════════════════════════════════════
        // THEME SYSTEM
        // ════════════════════════════════════════════════════════
        const THEMES = ["midnight","neon","nord","dracula"];

        function setTheme(theme) {
            if (!THEMES.includes(theme)) theme = "midnight";
            document.body.classList.remove(...THEMES.map(t => `theme-${t}`));
            if (theme !== "midnight") document.body.classList.add(`theme-${theme}`);
            document.querySelectorAll(".theme-option").forEach(btn => {
                btn.classList.toggle("active", btn.dataset.theme === theme);
            });
            localStorage.setItem("darknd_theme", theme);
        }

        // Init theme
        setTheme(localStorage.getItem("darknd_theme") || "midnight");

        // ════════════════════════════════════════════════════════
        // BACKGROUND SYSTEM
        // ════════════════════════════════════════════════════════
        function setBg(mode, imageUrl) {
            document.body.classList.remove("bg-image", "bg-solid");
            document.body.style.backgroundImage = "";

            if (mode === "solid") {
                document.body.classList.add("bg-solid");
            } else if (mode === "image") {
                const url = imageUrl || localStorage.getItem("darknd_bg_url") || "";
                if (url) {
                    document.body.classList.add("bg-image");
                    document.body.style.backgroundImage = `url(${CSS.escape ? `"${url}"` : url})`;
                }
            }
            // "particles" = default (no extra class)

            document.querySelectorAll(".bg-option").forEach(btn => {
                btn.classList.toggle("active", btn.dataset.bg === mode);
            });
            localStorage.setItem("darknd_bg", mode);
        }

        function applyBgImage() {
            const url = document.getElementById("bg-image-url").value.trim();
            if (!url) return;
            localStorage.setItem("darknd_bg_url", url);
            setBg("image", url);
        }

        // Init background
        (function() {
            const savedBg = localStorage.getItem("darknd_bg") || "particles";
            const savedUrl = localStorage.getItem("darknd_bg_url") || "";
            if (savedUrl) document.getElementById("bg-image-url").value = savedUrl;
            setBg(savedBg, savedUrl);
        })();

        // ════════════════════════════════════════════════════════
        // SEARCH ENGINE
        // ════════════════════════════════════════════════════════
        function setSearchEngine(val) {
            document.getElementById("sj-search-engine").value = val;
            localStorage.setItem("darknd_engine", val);
        }

        (function() {
            const saved = localStorage.getItem("darknd_engine");
            if (saved) {
                document.getElementById("sj-search-engine").value = saved;
                const sel = document.getElementById("search-engine-select");
                for (const opt of sel.options) {
                    if (opt.value === saved) { opt.selected = true; break; }
                }
            }
        })();

        // ════════════════════════════════════════════════════════
        // SETTINGS MODAL
        // ════════════════════════════════════════════════════════
        function openSettings() {
            document.getElementById("settings-modal").classList.add("open");
        }

        function closeSettings() {
            document.getElementById("settings-modal").classList.remove("open");
        }

        function handleSettingsOverlay(e) {
            if (e.target === document.getElementById("settings-modal")) closeSettings();
        }

        // ════════════════════════════════════════════════════════
        // BOOKMARKS
        // ════════════════════════════════════════════════════════
        function loadBookmarks() {
            try { return JSON.parse(localStorage.getItem("darknd_bookmarks") || "[]"); }
            catch { return []; }
        }

        function saveBookmarks(bms) {
            localStorage.setItem("darknd_bookmarks", JSON.stringify(bms));
        }

        function renderBookmarks() {
            const list = document.getElementById("bookmarks-list");
            const bms = loadBookmarks();
            if (bms.length === 0) {
                list.innerHTML = '<div class="bookmark-empty">No bookmarks saved</div>';
                return;
            }
            list.innerHTML = bms.map((bm, i) => `
                <div class="bookmark-item">
                    <img class="bookmark-favicon"
                        src="https://www.google.com/s2/favicons?domain=${encodeURIComponent(bm.url)}&sz=32"
                        onerror="this.style.display='none'" alt="" />
                    <span class="bookmark-name" onclick="navigateBookmark('${encodeURIComponent(bm.url)}')" title="${bm.url}">
                        ${bm.name || bm.url}
                    </span>
                    <button class="bookmark-del" onclick="deleteBookmark(${i})" title="Remove">✕</button>
                </div>
            `).join("");
        }

        function addBookmark() {
            const val = document.getElementById("sj-address").value.trim();
            if (!val) return;
            const bms = loadBookmarks();
            if (bms.some(b => b.url === val)) return;
            bms.push({ name: val.length > 30 ? val.slice(0, 30) + "…" : val, url: val });
            saveBookmarks(bms);
            renderBookmarks();
        }

        function deleteBookmark(i) {
            const bms = loadBookmarks();
            bms.splice(i, 1);
            saveBookmarks(bms);
            renderBookmarks();
        }

        function navigateBookmark(encodedUrl) {
            closeSettings();
            const url = decodeURIComponent(encodedUrl);
            document.getElementById("sj-address").value = url;
            document.getElementById("sj-form").requestSubmit();
        }

        renderBookmarks();

        // ════════════════════════════════════════════════════════
        // AUTOCOMPLETE
        // ════════════════════════════════════════════════════════
        const acList = document.getElementById("autocomplete-list");
        let acTimeout = null;
        let acActive = false;

        document.getElementById("sj-address").addEventListener("input", function() {
            clearTimeout(acTimeout);
            const val = this.value.trim();
            if (!val || val.startsWith("http")) {
                hideAC();
                return;
            }
            acTimeout = setTimeout(() => fetchSuggestions(val), 200);
        });

        document.getElementById("sj-address").addEventListener("keydown", function(e) {
            if (e.key === "Escape") hideAC();
        });

        document.addEventListener("click", function(e) {
            if (!e.target.closest(".search-wrap")) hideAC();
        });

        async function fetchSuggestions(q) {
            try {
                const res = await fetch(`/api/suggestions?q=${encodeURIComponent(q)}`);
                const items = await res.json();
                if (!items.length) { hideAC(); return; }
                showAC(items.slice(0, 6), q);
            } catch { hideAC(); }
        }

        function showAC(items, q) {
            acList.innerHTML = items.map(item => {
                const escaped = item.replace(/</g, "&lt;");
                const highlighted = escaped.replace(
                    new RegExp("^" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "i"),
                    match => `<mark>${match}</mark>`
                );
                return `<div class="autocomplete-item" onclick="pickAC('${encodeURIComponent(item)}')">${highlighted}</div>`;
            }).join("");
            acList.classList.add("visible");
            acActive = true;
        }

        function hideAC() {
            acList.classList.remove("visible");
            acActive = false;
        }

        function pickAC(encodedVal) {
            document.getElementById("sj-address").value = decodeURIComponent(encodedVal);
            hideAC();
            document.getElementById("sj-form").requestSubmit();
        }

        // ════════════════════════════════════════════════════════
        // ABOUT:BLANK CLOAKER
        // ════════════════════════════════════════════════════════
        function openCloaker() {
            const blank = window.open("about:blank", "_blank");
            if (!blank) return;
            blank.document.write(`<!doctype html><html><head>
                <title>Google Classroom</title>
                <style>*{margin:0;padding:0;overflow:hidden}body{background:#000}</style>
            </head><body>
                <iframe src="${location.href}" style="width:100vw;height:100vh;border:none;display:block"></iframe>
            </body></html>`);
            blank.document.close();
        }

        // ════════════════════════════════════════════════════════
        // HIDE UI ON PROXY LAUNCH
        // ════════════════════════════════════════════════════════
        document.getElementById("sj-form").addEventListener("submit", () => {
            document.querySelector("main").style.display = "none";
            document.querySelector("footer").style.display = "none";
            document.getElementById("bg").style.display = "none";
            document.getElementById("admin-link").style.display = "none";
            document.getElementById("ann-stack").style.display = "none";
            document.getElementById("chat-bubble").style.display = "none";
            document.getElementById("chat-drawer").style.display = "none";
            document.getElementById("settings-modal").style.display = "none";
        });

        // ════════════════════════════════════════════════════════
        // TAB BAR
        // ════════════════════════════════════════════════════════
        function tabNavigate(url) {
            document.getElementById("sj-address").value = url;
            document.getElementById("sj-form").requestSubmit();
        }

        // ════════════════════════════════════════════════════════
        // ANNOUNCEMENTS
        // ════════════════════════════════════════════════════════
        let shownAnnouncements = new Set(
            JSON.parse(localStorage.getItem("darknd_seen_ann") || "[]")
        );

        function saveSeenAnn() {
            localStorage.setItem("darknd_seen_ann", JSON.stringify([...shownAnnouncements]));
        }

        function showToast(text, id) {
            const stack = document.getElementById("ann-stack");
            const toast = document.createElement("div");
            toast.className = "ann-toast";
            toast.innerHTML = `
                <span class="ann-toast-dot"></span>
                <span class="ann-toast-text">${text}</span>
                <button class="ann-toast-close" onclick="dismissToast(this, '${id}')">✕</button>
            `;
            stack.appendChild(toast);
            requestAnimationFrame(() => {
                requestAnimationFrame(() => toast.classList.add("visible"));
            });
            setTimeout(() => dismissToast(toast.querySelector(".ann-toast-close"), id), 30000);
        }

        function dismissToast(btn, id) {
            const toast = btn.closest(".ann-toast");
            if (!toast || toast.classList.contains("hiding")) return;
            toast.classList.add("hiding");
            toast.classList.remove("visible");
            setTimeout(() => toast.remove(), 380);
            shownAnnouncements.add(id);
            saveSeenAnn();
        }

        async function loadAnnouncements() {
            try {
                const res = await fetch("/api/announcements");
                const data = await res.json();
                const list = data.announcements || [];
                list.forEach((text, i) => {
                    const id = `ann-${i}-${text.slice(0, 20)}`;
                    if (!shownAnnouncements.has(id)) showToast(text, id);
                });
                const currentIds = new Set(list.map((t, i) => `ann-${i}-${t.slice(0, 20)}`));
                for (const id of shownAnnouncements) {
                    if (!currentIds.has(id)) shownAnnouncements.delete(id);
                }
                saveSeenAnn();
            } catch (e) { /* silent */ }
        }

        loadAnnouncements();
        setInterval(loadAnnouncements, 20000);

        // ════════════════════════════════════════════════════════
        // CHAT DRAWER (CLEANED)
        // ════════════════════════════════════════════════════════
        let drawerOpen = false;
        let lastMessageCount = 0;
        let unreadCount = 0;
        let chatUsername = localStorage.getItem("darknd_username") || "Anonymous";

        const usernameInput = document.getElementById("username-display");
        usernameInput.value = chatUsername;
        usernameInput.addEventListener("change", () => {
            const val = usernameInput.value.trim().slice(0, 20);
            chatUsername = val || "Anonymous";
            usernameInput.value = chatUsername;
            localStorage.setItem("darknd_username", chatUsername);
        });
        usernameInput.addEventListener("keydown", e => { if (e.key === "Enter") usernameInput.blur(); });

        function toggleDrawer() {
            drawerOpen = !drawerOpen;
            document.getElementById("chat-drawer").classList.toggle("open", drawerOpen);
            if (drawerOpen) {
                unreadCount = 0;
                updateUnreadBadge();
                setTimeout(() => {
                    const msgs = document.getElementById("chat-messages");
                    msgs.scrollTop = msgs.scrollHeight;
                }, 50);
            }
        }

        function updateUnreadBadge() {
            const badge = document.getElementById("chat-unread");
            if (unreadCount > 0 && !drawerOpen) {
                badge.textContent = unreadCount > 9 ? "9+" : unreadCount;
                badge.classList.add("show");
            } else {
                badge.classList.remove("show");
            }
        }

        async function sendMessage() {
            const input = document.getElementById("chat-input");
            const text = input.value.trim();
            if (!text) return;
            input.value = "";
            try {
                await fetch("/api/chat/send", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username: chatUsername, text }),
                });
                loadChatMessages();
            } catch (e) { /* silent */ }
        }

        document.getElementById("chat-input").addEventListener("keydown", e => {
            if (e.key === "Enter") sendMessage();
        });

        async function loadChatMessages() {
            try {
                const res = await fetch("/api/chat");
                const data = await res.json();
                const msgs = data.messages || [];
                
                const newCount = msgs.length - lastMessageCount;
                if (newCount > 0 && lastMessageCount > 0 && !drawerOpen) {
                    unreadCount += newCount;
                    updateUnreadBadge();
                }
                lastMessageCount = msgs.length;

                const container = document.getElementById("chat-messages");
                if (msgs.length === 0) {
                    container.innerHTML = '<div class="chat-empty">No messages yet</div>';
                    return;
                }

                const wasAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 20;

                // Render messages without reaction HTML
                container.innerHTML = msgs.map((m, i) => {
                    const cls = m.isAdmin ? "chat-msg-user admin-user" : "chat-msg-user";
                    return `
                        <div class="chat-msg-wrap">
                            <div class="chat-msg">
                                <span class="${cls}">${m.username}:</span>
                                <span class="chat-msg-text">${m.text}</span>
                            </div>
                        </div>
                    `;
                }).join("");

                if (wasAtBottom || drawerOpen) container.scrollTop = container.scrollHeight;
            } catch (e) { /* silent */ }
        }

        loadChatMessages();
        setInterval(loadChatMessages, 2500);
        </script>
    </body>
</html>
