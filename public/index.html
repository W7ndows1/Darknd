<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖤</text></svg>" />
        <title>Darknd</title>

        <script src="/scram/scramjet.all.js"></script>
        <script src="/baremux/index.js"></script>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="index.css" />
        <script src="register-sw.js" defer></script>
        <script src="search.js" defer></script>
        <script src="index.js" defer></script>

        <style>
            /* ── Admin Shield ── */
            .admin-shield {
                position: fixed; top: 20px; left: 20px; z-index: 100;
                color: rgba(255,255,255,0.2); transition: all 0.3s ease; text-decoration: none;
            }
            .admin-shield:hover { color: rgba(255,255,255,0.8); transform: scale(1.1); }

            /* ── Tab Bar ── */
            .tab-bar {
                display: flex; gap: 0.5rem; align-items: center;
                width: 100%; justify-content: center; flex-wrap: wrap;
            }
            .tab-btn {
                display: flex; align-items: center; gap: 0.45rem;
                padding: 0.38rem 0.75rem;
                background: rgba(255,255,255,0.04);
                border: 1px solid rgba(255,255,255,0.08);
                border-radius: 8px; cursor: pointer; color: #888;
                font-family: 'DM Mono', monospace; font-size: 0.68rem;
                letter-spacing: 0.06em; transition: all 0.2s; text-decoration: none;
                white-space: nowrap;
            }
            .tab-btn img { width: 14px; height: 14px; border-radius: 3px; opacity: 0.8; }
            .tab-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.18); color: #ddd; }
            .tab-bar-divider { width: 1px; height: 14px; background: rgba(255,255,255,0.08); flex-shrink: 0; }

            /* ════════════════════════════════════════
               ANNOUNCEMENT TOASTS  (top-right, auto-hide)
               ════════════════════════════════════════ */
            #ann-stack {
                position: fixed; top: 1.2rem; right: 1.4rem;
                z-index: 50; display: flex; flex-direction: column; gap: 0.5rem;
                align-items: flex-end; pointer-events: none;
            }
            .ann-toast {
                pointer-events: auto;
                display: flex; align-items: flex-start; gap: 0.55rem;
                padding: 0.65rem 0.9rem;
                background: rgba(12,12,12,0.75);
                border: 1px solid rgba(255,255,255,0.09);
                border-radius: 10px;
                backdrop-filter: blur(18px) saturate(160%);
                -webkit-backdrop-filter: blur(18px) saturate(160%);
                box-shadow: 0 8px 32px rgba(0,0,0,0.45);
                max-width: 280px;
                opacity: 0; transform: translateX(18px);
                transition: opacity 0.35s ease, transform 0.35s ease;
            }
            .ann-toast.visible { opacity: 1; transform: translateX(0); }
            .ann-toast.hiding  { opacity: 0; transform: translateX(18px); }
            .ann-toast-dot {
                width: 6px; height: 6px; border-radius: 50%;
                background: #e05555; flex-shrink: 0; margin-top: 0.3rem;
                animation: ann-pulse 2s ease-in-out infinite;
            }
            @keyframes ann-pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
            .ann-toast-text {
                font-family: 'DM Mono', monospace; font-size: 0.73rem;
                color: #bbb; line-height: 1.5; flex: 1;
            }
            .ann-toast-close {
                background: none; border: none; color: #333; cursor: pointer;
                font-size: 0.75rem; line-height: 1; padding: 0; flex-shrink: 0;
                transition: color 0.2s; margin-top: 0.1rem;
            }
            .ann-toast-close:hover { color: #888; }

            /* ════════════════════════════════════════
               CHAT BUBBLE + DRAWER
               ════════════════════════════════════════ */

            /* Bubble toggle (bottom-right) */
            #chat-bubble {
                position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 50;
                width: 46px; height: 46px; border-radius: 50%;
                background: rgba(18,18,18,0.9);
                border: 1px solid rgba(255,255,255,0.12);
                backdrop-filter: blur(14px);
                display: flex; align-items: center; justify-content: center;
                cursor: pointer; transition: transform 0.2s, border-color 0.2s;
                box-shadow: 0 6px 24px rgba(0,0,0,0.5);
            }
            #chat-bubble:hover { transform: scale(1.08); border-color: rgba(255,255,255,0.25); }
            #chat-bubble svg { color: #555; transition: color 0.2s; }
            #chat-bubble:hover svg { color: #aaa; }
            #chat-unread {
                position: absolute; top: -3px; right: -3px;
                width: 14px; height: 14px; border-radius: 50%;
                background: #e05555; border: 2px solid #080808;
                font-family: 'DM Mono', monospace; font-size: 0.5rem;
                color: #fff; display: none; align-items: center; justify-content: center;
            }
            #chat-unread.show { display: flex; }

            /* Drawer */
            #chat-drawer {
                position: fixed; top: 0; right: 0; bottom: 0;
                width: 300px; z-index: 60;
                display: flex; flex-direction: column;
                background: rgba(9,9,9,0.88);
                border-left: 1px solid rgba(255,255,255,0.07);
                backdrop-filter: blur(20px) saturate(160%);
                -webkit-backdrop-filter: blur(20px) saturate(160%);
                box-shadow: -16px 0 48px rgba(0,0,0,0.5);
                transform: translateX(100%);
                transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            }
            #chat-drawer.open { transform: translateX(0); }

            .drawer-header {
                display: flex; align-items: center; justify-content: space-between;
                padding: 1rem 1.1rem 0.85rem;
                border-bottom: 1px solid rgba(255,255,255,0.06);
                flex-shrink: 0;
            }
            .drawer-header-left { display: flex; align-items: center; gap: 0.5rem; }
            .chat-dot { width: 7px; height: 7px; border-radius: 50%; background: #4caf87; }
            .drawer-title {
                font-family: 'DM Mono', monospace; font-size: 0.62rem;
                letter-spacing: 0.2em; color: #555;
            }
            .drawer-close {
                background: none; border: none; color: #333; cursor: pointer;
                font-size: 1.1rem; line-height: 1; padding: 2px;
                transition: color 0.2s;
            }
            .drawer-close:hover { color: #888; }

            .drawer-messages {
                flex: 1; overflow-y: auto; padding: 0.8rem 1.1rem;
                display: flex; flex-direction: column; gap: 0.4rem;
            }
            .drawer-messages::-webkit-scrollbar { width: 3px; }
            .drawer-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

            .chat-msg { font-family: 'DM Mono', monospace; font-size: 0.7rem; line-height: 1.45; }
            .chat-msg-user { color: #7ab4ff; font-weight: 400; }
            .chat-msg-user.admin-user { color: #e05555; }
            .chat-msg-text { color: #777; }
            .chat-empty { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: #2a2a2a; text-align: center; margin-top: 2rem; }

            .drawer-username-row {
                display: flex; align-items: center; gap: 0.35rem;
                padding: 0.4rem 1.1rem;
                border-top: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;
            }
            .drawer-username-label {
                font-family: 'DM Mono', monospace; font-size: 0.6rem;
                color: #383838; white-space: nowrap; flex-shrink: 0;
            }
            .drawer-username-input {
                background: none; border: none; border-bottom: 1px solid transparent;
                color: #777; font-family: 'DM Mono', monospace; font-size: 0.6rem;
                outline: none; width: 100%; padding: 0; cursor: text;
                transition: border-color 0.2s, color 0.2s;
            }
            .drawer-username-input:focus { border-bottom-color: rgba(255,255,255,0.15); color: #bbb; }

            .drawer-input-row {
                display: flex; gap: 0.4rem; padding: 0.65rem 1.1rem;
                border-top: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;
            }
            .drawer-input {
                flex: 1; padding: 0.45rem 0.7rem;
                background: rgba(255,255,255,0.04);
                border: 1px solid rgba(255,255,255,0.07);
                border-radius: 8px; color: #e0e0e0;
                font-family: 'DM Mono', monospace; font-size: 0.72rem;
                outline: none; transition: border-color 0.2s;
            }
            .drawer-input:focus { border-color: rgba(255,255,255,0.18); }
            .drawer-send-btn {
                padding: 0 0.75rem; background: rgba(255,255,255,0.07);
                border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
                color: #aaa; cursor: pointer; font-size: 0.9rem;
                transition: background 0.2s; flex-shrink: 0;
            }
            .drawer-send-btn:hover { background: rgba(255,255,255,0.13); }

            @media (max-width: 600px) {
                #ann-stack { display: none; }
                #chat-bubble { display: none; }
                #chat-drawer { width: 100%; }
            }
        </style>
    </head>

    <body>
        <a href="/admin" class="admin-shield" id="admin-link" title="Admin Panel">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
        </a>

        <canvas id="bg"></canvas>

        <!-- Announcement Toasts -->
        <div id="ann-stack"></div>

        <!-- Chat Bubble -->
        <div id="chat-bubble" onclick="toggleDrawer()" title="Open Chat">
            <div id="chat-unread"></div>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
        </div>

        <!-- Chat Drawer -->
        <div id="chat-drawer">
            <div class="drawer-header">
                <div class="drawer-header-left">
                    <span class="chat-dot"></span>
                    <span class="drawer-title">LIVE CHAT</span>
                </div>
                <button class="drawer-close" onclick="toggleDrawer()">✕</button>
            </div>
            <div class="drawer-messages" id="chat-messages">
                <div class="chat-empty">No messages yet</div>
            </div>
            <div class="drawer-username-row">
                <span class="drawer-username-label">Chatting as:</span>
                <input class="drawer-username-input" id="username-display" type="text" maxlength="20" value="Anonymous" title="Click to change username" />
            </div>
            <div class="drawer-input-row">
                <input class="drawer-input" id="chat-input" type="text" placeholder="Message..." maxlength="300" />
                <button class="drawer-send-btn" onclick="sendMessage()">→</button>
            </div>
        </div>

        <main>
            <div class="brand">
                <div class="brand-mark">
                    <span class="b1"></span>
                    <span class="b2"></span>
                </div>
                <p class="brand-sub">SECURE ACCESS</p>
            </div>

            <h1 class="headline">Where to?</h1>

            <form id="sj-form" class="search-wrap">
                <input id="sj-search-engine" value="https://www.google.com/search?q=%s" type="hidden" />
                <input id="sj-address" type="text" placeholder="Search or enter a URL..." autocomplete="off" spellcheck="false" />
                <button type="submit" class="go-btn" aria-label="Go">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="5" y1="12" x2="19" y2="12"/>
                        <polyline points="12 5 19 12 12 19"/>
                    </svg>
                </button>
            </form>

            <!-- Quick Access Tab Bar -->
            <div class="tab-bar">
                <button class="tab-btn" onclick="tabNavigate('play.geforcenow.com')">
                    <img src="https://play.geforcenow.com/favicon.ico" alt="" onerror="this.style.display='none'" />
                    GeForce Now
                </button>
                <div class="tab-bar-divider"></div>
                <button class="tab-btn" onclick="tabNavigate('duckduckgo.com')">
                    <img src="https://duckduckgo.com/favicon.ico" alt="" onerror="this.style.display='none'" />
                    DuckDuckGo
                </button>
            </div>

            <div class="error-wrap">
                <p id="sj-error"></p>
                <pre id="sj-error-code"></pre>
            </div>
        </main>

        <footer>
            <form method="POST" action="/logout">
                <button type="submit" class="logout-btn">LOGOUT</button>
            </form>
        </footer>

        <script>
            // ── Particle Background ──────────────────────────────────────────
            const canvas = document.getElementById("bg");
            const ctx = canvas.getContext("2d");
            let W, H, dots;
            function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
            function initDots() {
                dots = Array.from({ length: 55 }, () => ({
                    x: Math.random() * W, y: Math.random() * H,
                    r: Math.random() * 1.4 + 0.3,
                    vx: (Math.random() - 0.5) * 0.25, vy: (Math.random() - 0.5) * 0.25,
                    a: Math.random() * 0.35 + 0.04,
                }));
            }
            function draw() {
                ctx.clearRect(0, 0, W, H);
                for (const d of dots) {
                    d.x += d.vx; d.y += d.vy;
                    if (d.x < 0) d.x = W; if (d.x > W) d.x = 0;
                    if (d.y < 0) d.y = H; if (d.y > H) d.y = 0;
                    ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,255,255,${d.a})`; ctx.fill();
                }
                requestAnimationFrame(draw);
            }
            resize(); initDots(); draw();
            window.addEventListener("resize", () => { resize(); initDots(); });

            // Hide UI when navigation starts
            document.getElementById("sj-form").addEventListener("submit", () => {
                document.querySelector("main").style.display = "none";
                document.querySelector("footer").style.display = "none";
                document.getElementById("bg").style.display = "none";
                document.getElementById("admin-link").style.display = "none";
                document.getElementById("ann-stack").style.display = "none";
                document.getElementById("chat-bubble").style.display = "none";
                document.getElementById("chat-drawer").style.display = "none";
            });

            // ── Tab Bar ──────────────────────────────────────────────────────
            function tabNavigate(url) {
                document.getElementById("sj-address").value = url;
                document.getElementById("sj-form").requestSubmit();
            }

            // ── Announcement Toasts ──────────────────────────────────────────
            let shownAnnouncements = new Set(
                JSON.parse(localStorage.getItem("darknd_seen_ann") || "[]")
            );

            function saveSeenAnn() {
                localStorage.setItem("darknd_seen_ann", JSON.stringify([...shownAnnouncements]));
            }

            function showToast(text, id) {
                const stack = document.getElementById("ann-stack");
                const toast = document.createElement("div");
                toast.className = "ann-toast";
                toast.innerHTML = `
                    <span class="ann-toast-dot"></span>
                    <span class="ann-toast-text">${text}</span>
                    <button class="ann-toast-close" onclick="dismissToast(this, '${id}')">✕</button>
                `;
                stack.appendChild(toast);
                // Animate in
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => toast.classList.add("visible"));
                });
                // Auto-hide after 30 seconds
                setTimeout(() => dismissToast(toast.querySelector(".ann-toast-close"), id), 30000);
            }

            function dismissToast(btn, id) {
                const toast = btn.closest(".ann-toast");
                if (!toast || toast.classList.contains("hiding")) return;
                toast.classList.add("hiding");
                toast.classList.remove("visible");
                setTimeout(() => toast.remove(), 380);
                shownAnnouncements.add(id);
                saveSeenAnn();
            }

            async function loadAnnouncements() {
                try {
                    const res = await fetch("/api/announcements");
                    const data = await res.json();
                    const list = data.announcements || [];
                    list.forEach((text, i) => {
                        const id = `ann-${i}-${text.slice(0,20)}`;
                        if (!shownAnnouncements.has(id)) showToast(text, id);
                    });
                    // Clear seen set for announcements that no longer exist
                    const currentIds = new Set(list.map((t, i) => `ann-${i}-${t.slice(0,20)}`));
                    for (const id of shownAnnouncements) {
                        if (!currentIds.has(id)) shownAnnouncements.delete(id);
                    }
                    saveSeenAnn();
                } catch (e) { /* silent */ }
            }
            loadAnnouncements();
            setInterval(loadAnnouncements, 20000);

            // ── Chat Drawer ──────────────────────────────────────────────────
            let drawerOpen = false;
            let lastMessageCount = 0;
            let unreadCount = 0;
            let chatUsername = localStorage.getItem("darknd_username") || "Anonymous";

            const usernameInput = document.getElementById("username-display");
            usernameInput.value = chatUsername;
            usernameInput.addEventListener("change", () => {
                const val = usernameInput.value.trim().slice(0, 20);
                chatUsername = val || "Anonymous";
                usernameInput.value = chatUsername;
                localStorage.setItem("darknd_username", chatUsername);
            });
            usernameInput.addEventListener("keydown", e => { if (e.key === "Enter") usernameInput.blur(); });

            function toggleDrawer() {
                drawerOpen = !drawerOpen;
                document.getElementById("chat-drawer").classList.toggle("open", drawerOpen);
                if (drawerOpen) {
                    unreadCount = 0;
                    updateUnreadBadge();
                    setTimeout(() => {
                        const msgs = document.getElementById("chat-messages");
                        msgs.scrollTop = msgs.scrollHeight;
                    }, 50);
                }
            }

            function updateUnreadBadge() {
                const badge = document.getElementById("chat-unread");
                if (unreadCount > 0 && !drawerOpen) {
                    badge.textContent = unreadCount > 9 ? "9+" : unreadCount;
                    badge.classList.add("show");
                } else {
                    badge.classList.remove("show");
                }
            }

            async function sendMessage() {
                const input = document.getElementById("chat-input");
                const text = input.value.trim();
                if (!text) return;
                input.value = "";
                try {
                    await fetch("/api/chat/send", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ username: chatUsername, text }),
                    });
                    loadChatMessages();
                } catch (e) { /* silent */ }
            }

            document.getElementById("chat-input").addEventListener("keydown", e => {
                if (e.key === "Enter") sendMessage();
            });

            async function loadChatMessages() {
                try {
                    const res = await fetch("/api/chat");
                    const data = await res.json();
                    const msgs = data.messages || [];
                    if (msgs.length === lastMessageCount) return;
                    const newCount = msgs.length - lastMessageCount;
                    if (newCount > 0 && lastMessageCount > 0 && !drawerOpen) {
                        unreadCount += newCount;
                        updateUnreadBadge();
                    }
                    lastMessageCount = msgs.length;
                    const container = document.getElementById("chat-messages");
                    if (msgs.length === 0) {
                        container.innerHTML = '<div class="chat-empty">No messages yet</div>';
                        return;
                    }
                    const wasAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 20;
                    container.innerHTML = msgs.map(m => {
                        const cls = m.isAdmin ? "chat-msg-user admin-user" : "chat-msg-user";
                        return `<div class="chat-msg"><span class="${cls}">${m.username}:</span> <span class="chat-msg-text">${m.text}</span></div>`;
                    }).join("");
                    if (wasAtBottom || drawerOpen) container.scrollTop = container.scrollHeight;
                } catch (e) { /* silent */ }
            }
            loadChatMessages();
            setInterval(loadChatMessages, 2500);
        </script>
    </body>
</html>
