<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Required</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
<canvas id="bg"></canvas>

<!-- Hidden Rammerhead fields (required by script) -->
<input type="hidden" id="session-id" value="">
<input type="hidden" id="session-httpproxy" value="">
<input type="hidden" id="session-password" value="sharkie4life">

<!-- LOGIN OVERLAY -->
<div id="login-overlay">
  <div class="login-card" id="loginCard">
    <div class="brand">
      <div class="brand-mark">
        <span class="b1"></span>
        <span class="b2"></span>
      </div>
      <p class="brand-sub">SECURE ACCESS</p>
    </div>
    <div class="field-wrap">
      <label for="keyInput">ACCESS KEY</label>
      <div class="input-row">
        <input id="keyInput" type="password" placeholder="Enter your key" autocomplete="off" spellcheck="false"/>
        <button id="submitBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </div>
      <div id="errorMsg" class="error-msg"></div>
    </div>
    <p class="hint">Don't have a key? Contact the administrator.</p>
  </div>
</div>

<!-- HOME UI (shown after login) -->
<div id="home-ui" style="display:none">
  <header class="home-header">
    <div class="brand-mark sm"><span class="b1"></span><span class="b2"></span></div>
    <button id="logoutBtn" class="logout-btn">LOGOUT</button>
  </header>
  <div class="search-section">
    <h1 class="search-title">Where to?</h1>
    <div class="search-wrap">
      <input id="session-url" type="text" placeholder="Search or enter a URL..." autocomplete="off" spellcheck="false"/>
      <button id="session-go" class="go-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
    <div id="error-text" class="error-msg" style="display:none"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
